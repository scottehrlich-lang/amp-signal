<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AMP Signal — AI Sales Intelligence</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #0f172a; font-size: 13px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
@keyframes typing { from { opacity:0; } to { opacity:1; } }

#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* TOP BAR */
#topbar {
  background: #fff; border-bottom: 1px solid #e2e8f0;
  padding: 0 20px; height: 54px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  flex-shrink: 0;
}
.logo { display:flex; align-items:center; gap:8px; }
.logo-icon { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:900; font-size:13px; }
.logo-text { font-weight:900; font-size:15px; }
.logo-text span { color:#6366f1; }
.divider { width:1px; height:24px; background:#e2e8f0; }
.persona-btns { display:flex; gap:4px; }
.persona-btn { background:none; border:1.5px solid transparent; border-radius:8px; padding:5px 12px; cursor:pointer; font-size:11px; font-weight:500; color:#64748b; font-family:inherit; transition:all .15s; }
.persona-btn.active { background:#f5f3ff; border-color:#a5b4fc; color:#4f46e5; font-weight:700; }
.live-dot { width:6px; height:6px; border-radius:50%; background:#10b981; animation:pulse 2s infinite; }
.live-label { font-size:11px; color:#94a3b8; font-weight:600; }
.user-avatar { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,#6366f1,#8b5cf6); display:flex; align-items:center; justify-content:center; color:#fff; font-size:10px; font-weight:800; }
.ml-auto { margin-left:auto; display:flex; align-items:center; gap:10px; }

/* NOTIFICATION */
#notif { background:#fffbeb; border-bottom:2px solid #fbbf24; padding:10px 20px; display:flex; align-items:center; gap:12; flex-shrink:0; }
#notif.hidden { display:none; }
.notif-label { font-size:12px; font-weight:700; color:#92400e; }
.notif-text { font-size:12px; color:#92400e; flex:1; }
.notif-close { background:none; border:none; cursor:pointer; color:#92400e; font-size:18px; font-weight:700; line-height:1; padding:0; }

/* LAYOUT */
#layout { display:flex; flex:1; overflow:hidden; }

/* SIDEBAR */
#sidebar { width:190px; background:#fff; border-right:1px solid #e2e8f0; padding:14px 10px; flex-shrink:0; overflow-y:auto; display:flex; flex-direction:column; }
.section-label { font-size:9px; font-weight:800; color:#94a3b8; letter-spacing:.12em; padding:0 6px; margin-bottom:8px; }
.tab-btn { background:none; border:none; padding:8px 14px; cursor:pointer; font-size:12px; font-weight:500; color:#64748b; border-radius:8px; transition:all .15s; text-align:left; width:100%; display:block; margin-bottom:2px; font-family:inherit; }
.tab-btn:hover { background:#f8fafc; }
.tab-btn.active { background:#f5f3ff; color:#4f46e5; font-weight:700; }
.cf-sidebar { margin-top:20px; padding-top:14px; border-top:1px solid #f1f5f9; }
.cf-item { margin-bottom:9px; padding:0 6px; }
.cf-row { display:flex; justify-content:space-between; margin-bottom:2px; }
.cf-title { font-size:10px; color:#64748b; line-height:1.3; }
.cf-val { font-size:9px; font-weight:800; font-family:monospace; }
.bar-wrap { background:#e5e7eb; border-radius:999px; overflow:hidden; }
.bar-fill { border-radius:999px; transition:width .8s ease; }
.data-sources { margin-top:auto; padding-top:12px; border-top:1px solid #f1f5f9; }
.source-row { display:flex; align-items:center; gap:6px; padding:3px 6px; }
.source-dot { width:5px; height:5px; border-radius:50%; background:#10b981; }
.source-label { font-size:10px; color:#94a3b8; }

/* CONTENT */
#content { flex:1; overflow-y:auto; background:#f8fafc; }
#content-inner { padding:18px 22px 22px; }
.page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.page-title { font-size:20px; font-weight:900; letter-spacing:-.03em; }
.page-sub { font-size:11px; color:#94a3b8; margin-top:2px; }

/* COMMON COMPONENTS */
.card { background:#fff; border:1px solid #e2e8f0; border-radius:12px; padding:18px; }
.ai-btn { background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff; border:none; border-radius:8px; padding:7px 13px; cursor:pointer; font-family:inherit; font-size:11px; font-weight:700; display:inline-flex; align-items:center; gap:5px; transition:all .15s; white-space:nowrap; }
.ai-btn:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(99,102,241,.25); }
.danger-btn { background:#fef2f2; border:1.5px solid #fecaca; border-radius:8px; padding:7px 12px; cursor:pointer; font-family:inherit; font-size:11px; font-weight:600; color:#dc2626; }
.chip { font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; display:inline-block; }
.note-input { border:1.5px solid #e2e8f0; border-radius:8px; padding:6px 10px; font-family:inherit; font-size:11px; outline:none; flex:1; }
.note-input:focus { border-color:#6366f1; }
.done-btn { background:#f8fafc; border:1.5px solid #e2e8f0; border-radius:8px; padding:5px 12px; cursor:pointer; font-size:11px; font-weight:700; color:#64748b; font-family:inherit; flex-shrink:0; }
.done-btn.done { background:#f0fdf4; border-color:#bbf7d0; color:#16a34a; }

/* GRID HELPERS */
.grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.grid-3-2 { display:grid; grid-template-columns:3fr 2fr; gap:14px; }
.grid-2-1 { display:grid; grid-template-columns:2fr 1fr; gap:14px; }
.flex-col { display:flex; flex-direction:column; gap:14px; }
.flex-row { display:flex; gap:12px; }
.flex-center { display:flex; align-items:center; }
.gap-8 { gap:8px; }
.gap-10 { gap:10px; }
.gap-12 { gap:12px; }
.gap-14 { gap:14px; }

/* HERO CARDS */
.hero-purple { background:linear-gradient(135deg,#4f46e5,#7c3aed); border-radius:16px; padding:22px 26px; color:#fff; }
.hero-dark { background:linear-gradient(135deg,#0f172a,#1e293b); border-radius:16px; padding:22px 26px; color:#fff; }
.hero-indigo { background:linear-gradient(135deg,#6366f1,#8b5cf6); border-radius:12px; padding:12px 18px; color:#fff; }

/* AI MODAL */
#ai-modal { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; display:flex; align-items:flex-end; justify-content:center; }
#ai-modal.hidden { display:none; }
#ai-panel { background:#fff; border-radius:16px 16px 0 0; border-top:3px solid #6366f1; width:100%; max-width:720px; max-height:55vh; display:flex; flex-direction:column; animation:slideUp .25s ease; box-shadow:0 -8px 32px rgba(0,0,0,.12); }
.ai-header { padding:12px 18px; border-bottom:1px solid #f1f5f9; display:flex; align-items:center; gap:8px; }
.ai-dot { width:7px; height:7px; border-radius:50%; background:#6366f1; animation:pulse 2s infinite; }
.ai-title { font-size:11px; font-weight:800; color:#4f46e5; letter-spacing:.08em; }
.ai-label-chip { font-size:10px; color:#94a3b8; background:#f1f5f9; padding:2px 7px; border-radius:5px; }
.ai-close { margin-left:auto; background:#f1f5f9; border:none; width:24px; height:24px; border-radius:6px; cursor:pointer; color:#64748b; font-weight:700; font-family:inherit; font-size:14px; display:flex; align-items:center; justify-content:center; }
.ai-body { flex:1; overflow-y:auto; padding:14px 18px; }
.ai-text { font-size:13px; color:#334155; line-height:1.9; white-space:pre-wrap; }
.ai-loading { display:flex; flex-direction:column; gap:8px; }
.ai-loading-msg { font-size:11px; color:#94a3b8; font-style:italic; margin-bottom:4px; }
.skeleton { height:9px; background:#e2e8f0; border-radius:4px; animation:pulse 1.4s infinite; }

/* REGION ROWS */
.region-row { display:flex; gap:16px; align-items:center; }
.region-pct-box { width:44px; height:44px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:900; flex-shrink:0; }
.region-name { font-size:14px; font-weight:800; margin-bottom:2px; }
.region-vp { font-size:11px; color:#94a3b8; }
.region-bar-wrap { flex:2; }
.region-stats { display:flex; gap:14px; }
.region-stat { text-align:center; }
.region-stat-val { font-size:14px; font-weight:800; }
.region-stat-label { font-size:9px; color:#94a3b8; font-weight:700; }

/* SELLER ROWS */
.seller-card { margin-bottom:0; }
.seller-avatar { width:38px; height:38px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; flex-shrink:0; }

/* QUEUE */
.queue-item { border-radius:12px; }
.queue-account { font-size:13px; font-weight:800; }
.queue-action { font-size:12px; color:#64748b; line-height:1.6; margin-top:4px; }
.queue-due { text-align:right; flex-shrink:0; }
.queue-due-label { font-size:10px; font-weight:700; color:#94a3b8; margin-bottom:2px; }
.queue-due-val { font-size:13px; font-weight:800; }

/* CHART */
.chart-bars { display:flex; gap:4px; align-items:flex-end; height:140px; margin-bottom:10px; }
.chart-col { flex:1; display:flex; flex-direction:column; gap:2px; align-items:center; }
.chart-pair { display:flex; gap:2px; align-items:flex-end; height:120px; width:100%; }
.chart-bar { flex:1; border-radius:3px 3px 0 0; }
.chart-label { font-size:9px; color:#94a3b8; font-weight:600; }
.chart-legend { display:flex; gap:16px; font-size:10px; color:#94a3b8; }
.legend-item { display:flex; gap:5px; align-items:center; }
.legend-swatch { width:10px; height:10px; border-radius:2px; }

/* CF ITEMS */
.cf-full { margin-bottom:12px; padding:16px 18px; border-left:4px solid; }
</style>
</head>
<body>

  insight:"Margin expanding +2.4pts YTD driven by digital mix shift. Every 1pt gain in digital mix adds ~0.8pts to blended margin. Linear TV remains 41.6% of contribution but at only 31% margin — the mix shift to digital and CTV is the highest-leverage margin lever available.",

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function bar(pct, color, h=8) {
  const c = color || pctColor(pct);
  return `<div class="bar-wrap" style="height:${h}px"><div class="bar-fill" style="width:${Math.min(pct,100)}%;height:100%;background:${c}"></div></div>`;

function chip(label, color) {
  return `<span class="chip" style="background:${color}18;color:${color};border:1px solid ${color}30">${label}</span>`;
}
function statusColor(s) { return {on_track:"#10b981","on-track":"#10b981",behind:"#f59e0b","at-risk":"#ef4444"}[s]||"#94a3b8"; }

// ─── AI MODAL ─────────────────────────────────────────────────────────────────
let typingInterval = null;
function openAI(key, label) {
  document.getElementById('ai-modal').classList.remove('hidden');
  document.getElementById('ai-label').textContent = label;
  const body = document.getElementById('ai-body');
  body.innerHTML = `<div class="ai-loading"><div class="ai-loading-msg">Analyzing OSI and Dynamics data...</div>${[90,75,85,65].map((w,i)=>`<div class="skeleton" style="width:${w}%;animation-delay:${i*0.1}s"></div>`).join('')}</div>`;
  
  clearInterval(typingInterval);
  setTimeout(() => {
    const text = AI_TEXT[key] || AI_TEXT.talking;
    body.innerHTML = `<div class="ai-text" id="ai-output"></div>`;
    const out = document.getElementById('ai-output');
    let i = 0;
    typingInterval = setInterval(() => {
      if (i < text.length) { out.textContent = text.slice(0, ++i); }
      else { clearInterval(typingInterval); }
    }, 14);
  }, 800 + Math.random()*300);
}
function closeAI() {
  clearInterval(typingInterval);
  document.getElementById('ai-modal').classList.add('hidden');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const cur = PERSONAS.find(p=>p.id===state.persona);
  const tabs = TABS_BY_PERSONA[state.persona];

  // Persona buttons
  document.getElementById('persona-btns').innerHTML = PERSONAS.map(p=>
    `<button class="persona-btn${state.persona===p.id?' active':''}" onclick="switchPersona('${p.id}')">${p.label}</button>`
  ).join('');

  // Avatar
  document.getElementById('user-avatar').textContent = cur.initials;

  // Tab buttons
  document.getElementById('tab-btns').innerHTML = tabs.map(t=>
    `<button class="tab-btn${state.tab===t?' active':''}" onclick="switchTab('${t}')">${t}</button>`
  ).join('');

  // CF sidebar
  document.getElementById('cf-sidebar').innerHTML = CF.map(cf => {
    const sc = statusColor(cf.status);
    const pct = Math.round(cf.current/cf.target*100);
    return `<div class="cf-item">
      <div class="cf-row">
        <span class="cf-title">${cf.title}</span>
        <span class="cf-val" style="color:${sc}">${cf.current}${cf.unit}</span>
      </div>
      ${bar(pct, sc, 4)}
    </div>`;
  }).join('');

  // Content
  const inner = document.getElementById('content-inner');
  inner.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${state.tab}</div>
        <div class="page-sub">${cur.name} — ${cur.label}</div>
      </div>
      <button class="ai-btn" onclick="openAI('${state.persona==='ae'?'briefae':'briefcro'}','Signal Brief')">✦ Signal Brief</button>
    </div>
    <div id="tab-content" style="animation:fadeUp .3s ease"></div>
  `;

  const tc = document.getElementById('tab-content');
  const t = state.tab;
  if (t==="Overview")      tc.innerHTML = renderOverview();
  else if (t==="Regions")  tc.innerHTML = renderRegions();
  else if (t==="Critical Few") tc.innerHTML = renderCF();
  else if (t==="Margin")   tc.innerHTML = renderMargin();
  else if (t==="Pacing")   tc.innerHTML = renderPacing();
  else if (t==="Team")     tc.innerHTML = renderTeam();
  else if (t==="Action Queue") tc.innerHTML = renderQueue();
}

          <div style="display:flex;gap:4px;align-items:flex-end;height:44px">
            ${m.trend.map((v,i)=>`<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
              <div style="width:16px;background:${i===m.trend.length-1?'#a78bfa':'#334155'};border-radius:3px 3px 0 0;height:${Math.max(4,((v-26)/16)*40)}px"></div>
              <div style="font-size:8px;color:#475569">${m.trendLabels[i]}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
      <div style="background:rgba(255,255,255,.07);border-radius:10px;padding:12px 16px;font-size:12px;color:#94a3b8;line-height:1.7">${m.insight}</div>
    </div>
    <div class="grid-3-2">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <div style="font-size:12px;font-weight:800;color:#94a3b8;letter-spacing:.08em">MARGIN BY PRODUCT LINE</div>
          <button class="ai-btn" style="font-size:10px;padding:5px 10px" onclick="openAI('margin','Margin Analysis')">AI Analysis</button>
        </div>
        ${m.byProduct.map(p=>`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div style="display:flex;gap:8px;align-items:center">
              <div style="width:8px;height:8px;border-radius:50%;background:${p.color};flex-shrink:0"></div>
              <span style="font-size:12px;font-weight:600">${p.name}</span>
              <span style="font-size:10px;color:#94a3b8">($${p.revenue}K)</span>
            </div>
            <div style="display:flex;gap:14px;align-items:center">
              <span style="font-size:10px;color:#94a3b8">${p.contribution}% of margin</span>
              <span style="font-size:14px;font-weight:900;color:${p.margin>=50?'#10b981':p.margin>=35?'#d97706':'#94a3b8'};font-family:monospace;width:42px;text-align:right">${p.margin}%</span>
              <span style="font-size:11px;color:${p.trend==='up'?'#10b981':p.trend==='down'?'#ef4444':'#94a3b8'};font-weight:700">${p.trend==='up'?'▲':p.trend==='down'?'▼':'–'}</span>
            </div>
          </div>
          <div style="background:#e5e7eb;border-radius:999px;height:8px;overflow:hidden">
            <div style="width:${(p.margin/maxBar)*100}%;height:100%;background:${p.color};border-radius:999px"></div>
          </div>
        </div>`).join('')}
      </div>
      <div class="card">
        <div style="font-size:12px;font-weight:800;color:#94a3b8;letter-spacing:.08em;margin-bottom:16px">MARGIN BY REGION</div>
        ${m.byRegion.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:11px">
          <div style="width:28px;height:28px;border-radius:8px;background:${r.margin>=36?'#f0fdf4':r.margin>=32?'#fefce8':'#fef2f2'};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:${r.margin>=36?'#16a34a':r.margin>=32?'#d97706':'#dc2626'};flex-shrink:0">${i+1}</div>
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:12px;font-weight:600">${r.name}</span>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-size:11px;color:${r.trend==='up'?'#10b981':r.trend==='down'?'#ef4444':'#94a3b8'};font-weight:700">${r.trend==='up'?'▲':r.trend==='down'?'▼':'–'}</span>
                <span style="font-size:13px;font-weight:900;color:${r.margin>=36?'#10b981':r.margin>=32?'#d97706':'#dc2626'};font-family:monospace">${r.margin}%</span>
              </div>
            </div>
            <div style="background:#e5e7eb;border-radius:999px;height:6px;overflow:hidden">
              <div style="width:${(r.margin/42)*100}%;height:100%;background:${r.margin>=36?'#10b981':r.margin>=32?'#f59e0b':'#ef4444'};border-radius:999px"></div>
            </div>
          </div>
        </div>`).join('')}
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f1f5f9;font-size:11px;color:#64748b;line-height:1.6">
          <b style="color:#dc2626">Watch:</b> Midwest (28.4%) and Central (27.1%) are margin drags. Low digital mix is the common cause.
        </div>
      </div>
    </div>
  </div>`;
}

// ─── TEAM ─────────────────────────────────────────────────────────────────────
function renderTeam() {
  return`<div class="flex-col">
    <div style="background:#fef2f2;border:1.5px solid #fecaca;border-radius:12px;padding:12px 16px">
      <span style="font-size:12px;font-weight:800;color:#dc2626">ACTION NEEDED: </span>
      <span style="font-size:12px;color:#991b1b">Sun Valley Toyota renewal May 28 — 11 days no contact in Dynamics, OSI shows 58% spend decline. Assign Jordan Patel urgent call today.</span>
    </div>
    ${SELLERS.map(s=>`
    <div class="card seller-card" id="seller-${s.id}" style="opacity:${state.done['seller_'+s.id]?0.6:1}">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
        <div class="seller-avatar" style="background:${pctBg(s.pct)};color:${pctColor(s.pct)}">${s.name.split(' ').map(n=>n[0]).join('')}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700">${s.name}</div>
          <div style="font-size:11px;color:#94a3b8">${s.title}</div>
        </div>
        <div style="flex:1">${bar(s.pct,null,8)}
          <div style="display:flex;justify-content:space-between;margin-top:3px">
            <span style="font-size:10px;color:#94a3b8;font-family:monospace">${fmt(s.revenue)}</span>
            <span style="font-size:11px;font-weight:800;color:${pctColor(s.pct)}">${s.pct}%</span>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          ${s.risk>0?chip(`${s.risk} risk`,"#ef4444"):''}
          ${chip(`${s.digital}% dig`,s.digital>=28?"#10b981":"#f59e0b")}
        </div>
        <button class="ai-btn" style="font-size:10px;padding:5px 10px" onclick="openAI('talking','Coach — ${s.name}')">Coach</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:10px;font-weight:700;color:#94a3b8;flex-shrink:0">NOTE</span>
        <input class="note-input" placeholder="Note for ${s.name.split(' ')[0]}..." value="${state.notes['seller_'+s.id]||''}" oninput="updateNote('seller_${s.id}',this.value)">
        <button class="${state.done['seller_'+s.id]?'done-btn done':'done-btn'}" onclick="toggleDone('seller_${s.id}')">
          ${state.done['seller_'+s.id]?'Done ✓':'Mark Done'}
        </button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── QUEUE ────────────────────────────────────────────────────────────────────
function renderQueue() {
  const total = QUEUE.reduce((s,q)=>s+(q.revenue||0),0);
  return`<div class="flex-col">
    <div class="hero-indigo">
      <div style="font-size:12px;font-weight:800;margin-bottom:1px">Signal AI Action Queue</div>
      <div style="font-size:11px;color:#c4b5fd">Ranked by revenue + urgency — OSI Traffic + Dynamics CRM — ${QUEUE.length} items — Est. impact: ${fmt(total)}</div>
    </div>
    ${QUEUE.map(q=>`
    <div class="card queue-item" style="border-left:4px solid ${q.pri==='P1'?'#ef4444':q.pri==='P2'?'#f59e0b':'#e2e8f0'};opacity:${state.done['queue_'+q.id]?0.55:1}">
      <div style="display:flex;gap:12px;margin-bottom:10px">
        <div style="flex:1">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:5px">
            ${chip(q.pri,q.pri==='P1'?"#ef4444":q.pri==='P2'?"#f59e0b":"#94a3b8")}
            <span class="queue-account">${q.account}</span>
            ${q.revenue?`<span style="font-size:12px;font-weight:800;color:#10b981;margin-left:auto;font-family:monospace">${fmt(q.revenue)}</span>`:''}
          </div>
          <div class="queue-action">${q.action}</div>
        </div>
        <div class="queue-due">
          <div class="queue-due-label">DUE</div>
          <div class="queue-due-val" style="color:${q.due==='Today'?'#dc2626':q.due==='Tomorrow'?'#d97706':'#64748b'}">${q.due}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="ai-btn" style="font-size:10px;padding:5px 10px" onclick="openAI('talking','Talking Points')">Talking Points</button>
        ${q.type==='risk'?`<button class="danger-btn" style="font-size:10px;padding:5px 10px" onclick="openAI('renewal','Renewal Rescue')">Rescue Plan</button>`:''}
        <input class="note-input" placeholder="Add note..." value="${state.notes['queue_'+q.id]||''}" oninput="updateNote('queue_${q.id}',this.value)" style="font-size:11px">
        <button class="${state.done['queue_'+q.id]?'done-btn done':'done-btn'}" onclick="toggleDone('queue_${q.id}')">
          ${state.done['queue_'+q.id]?'Done ✓':'Mark Done'}
        </button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function switchPersona(p) {
  state.persona = p;
  state.tab = TABS_BY_PERSONA[p][0];
  render();
}
function switchTab(t) {
  state.tab = t;
  render();
}
function updateNote(key, val) {
  state.notes[key] = val;
}
function toggleDone(key) {
  state.done[key] = !state.done[key];
  render();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
