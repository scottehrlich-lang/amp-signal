<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AMP Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #0a1634;
  --navy2:   #0d1c3f;
  --navy3:   #162040;
  --navy-lt: #1a2d5a;
  --white:   #ffffff;
  --off:     #f7f8fc;
  --off2:    #eef0f7;
  --off3:    #e2e6f0;
  --text:    #0a1634;
  --text2:   #3d4f6e;
  --text3:   #7a8fa8;
  --text4:   #b0bfd0;
  --green:   #00a86b;
  --gdim:    #e8f8f2;
  --red:     #e03450;
  --rdim:    #fdedf0;
  --amber:   #e07b00;
  --adim:    #fff4e0;
  --blue:    #0a1634;
  --border:  #e4e8f2;
  --border2: #d0d8ea;
  --shadow:  0 1px 3px rgba(10,22,52,.07), 0 4px 12px rgba(10,22,52,.06);
  --shadow2: 0 2px 8px rgba(10,22,52,.1), 0 8px 24px rgba(10,22,52,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--off);color:var(--text);font-size:13px;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--off3);border-radius:2px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes shimmer{0%,100%{opacity:.4}50%{opacity:.8}}

/* TOPBAR */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{
  height:54px;background:var(--navy);
  display:flex;align-items:center;padding:0 20px;gap:0;flex-shrink:0;
  box-shadow:0 2px 12px rgba(10,22,52,.2)
}
.logo{display:flex;align-items:center;gap:10px;margin-right:22px}
.logo-sq{width:32px;height:32px;background:#fff;display:flex;align-items:center;justify-content:center;font-family:'Lato',sans-serif;font-weight:900;font-size:13px;color:var(--navy)}
.logo-name{font-family:'Lato',sans-serif;font-weight:900;font-size:16px;letter-spacing:.06em;text-transform:uppercase;color:#fff;line-height:1}
.logo-sub{font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45)}
.tb-sep{width:1px;height:22px;background:rgba(255,255,255,.12);margin:0 18px;flex-shrink:0}
.demo-label{font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.12);padding:3px 8px;margin-right:10px}
.ptabs{display:flex;gap:2px;background:rgba(255,255,255,.08);padding:3px;border-radius:4px}
.ptab{background:none;border:none;padding:4px 13px;font-family:'Lato',sans-serif;font-size:10px;font-weight:900;color:rgba(255,255,255,.45);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .12s;border-radius:3px}
.ptab:hover{color:rgba(255,255,255,.8)}
.ptab.on{background:#fff;color:var(--navy)}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-tag{display:flex;align-items:center;gap:5px;border:1px solid rgba(0,168,107,.5);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:900;color:#4de9a8;letter-spacing:.08em;text-transform:uppercase}
.live-dot{width:5px;height:5px;border-radius:50%;background:#4de9a8;animation:pulse 2s infinite}
.brief-btn{background:#fff;border:none;padding:7px 18px;border-radius:4px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);cursor:pointer;transition:all .12s;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.brief-btn:hover{background:#f0f2f8;transform:translateY(-1px)}
.user-box{width:30px;height:30px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:rgba(255,255,255,.7);letter-spacing:.04em}

/* NOTIF */
#notif{background:var(--navy2);border-bottom:3px solid #4de9a8;padding:9px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#notif.hidden{display:none}
.notif-pill{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;background:#4de9a8;color:var(--navy);padding:3px 10px;border-radius:2px;flex-shrink:0}
.notif-txt{font-size:12px;color:rgba(255,255,255,.7);flex:1}.notif-txt b{color:#fff;font-weight:900}
.notif-x{background:none;border:none;color:rgba(255,255,255,.3);cursor:pointer;font-size:16px;line-height:1;padding:0}
.notif-x:hover{color:#fff}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:196px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:16px 0;box-shadow:2px 0 8px rgba(10,22,52,.04)}
.sb-hd{font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--text3);padding:0 16px;margin-bottom:6px}
.nb{width:100%;background:none;border:none;padding:8px 16px;font-family:'Lato',sans-serif;font-size:13px;font-weight:400;color:var(--text2);cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px;transition:all .1s;border-left:3px solid transparent;margin-bottom:1px}
.nb:hover{background:var(--off);color:var(--text)}
.nb.on{background:var(--off);color:var(--navy);font-weight:900;border-left-color:var(--navy)}
.nb-ic{font-size:10px;opacity:.35;width:14px;text-align:center}.nb.on .nb-ic{opacity:1;color:var(--navy)}
.sb-div{height:1px;background:var(--border);margin:12px 16px}
.cf-sb{padding:0 16px}
.cfm{margin-bottom:10px}
.cfm-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.cfm-n{font-size:10px;color:var(--text3);font-weight:700}.cfm-v{font-family:'Space Mono',monospace;font-size:9px;font-weight:700}
.mtrack{height:4px;background:var(--off2);border-radius:2px;overflow:hidden}.mfill{height:100%;border-radius:2px}
.sb-bot{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border)}
.src{display:flex;align-items:center;gap:7px;padding:3px 0}
.src-d{width:5px;height:5px;border-radius:50%;background:var(--green)}
.src-l{font-size:10px;color:var(--text3)}

/* CONTENT */
#content{flex:1;overflow-y:auto;background:var(--off)}
#ci{padding:22px 24px 36px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px}
.pt{font-size:26px;font-weight:900;letter-spacing:-.01em;text-transform:uppercase;line-height:1;color:var(--navy)}
.ps{font-size:11px;color:var(--text3);margin-top:4px;font-weight:400}

/* CARDS */
.card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:18px;box-shadow:var(--shadow)}
.card-sm{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:14px;box-shadow:var(--shadow)}
.card-navy{background:var(--navy);border-radius:8px;padding:22px 24px;color:#fff;box-shadow:var(--shadow2)}
.card-navy .lbl{color:rgba(255,255,255,.45)}

/* HERO — navy on white, the AMP brand treatment */
.hero-navy{background:var(--navy);border-radius:10px;padding:24px 28px;color:#fff;box-shadow:var(--shadow2);position:relative;overflow:hidden}
.hero-navy::after{content:'';position:absolute;top:-60px;right:-60px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.03);pointer-events:none}

/* TYPOGRAPHY */
.lbl{font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--text3)}
.num-xl{font-size:52px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--white)}
.num-lg{font-size:32px;font-weight:900;letter-spacing:-.02em;line-height:1}
.num-md{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1}
.num-sm{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.num-xs{font-family:'Space Mono',monospace;font-size:11px}

/* BADGES */
.badge{display:inline-flex;align-items:center;font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:3px}
.badge-green{background:var(--gdim);color:var(--green)}
.badge-red{background:var(--rdim);color:var(--red)}
.badge-amber{background:var(--adim);color:var(--amber)}
.badge-navy{background:var(--navy);color:#fff}
.badge-dim{background:var(--off2);color:var(--text3);border:1px solid var(--border)}
.badge-blue{background:#eef2ff;color:#3b5bdb;border:1px solid #c5d0f5}

/* PROGRESS */
.track{background:var(--off2);border-radius:2px;overflow:hidden}
.fill{height:100%;border-radius:2px;transition:width .7s ease}

/* BUTTONS */
.btn-primary{background:var(--navy);border:none;border-radius:5px;padding:8px 16px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#fff;cursor:pointer;transition:all .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;box-shadow:0 2px 6px rgba(10,22,52,.2)}
.btn-primary:hover{background:var(--navy-lt);transform:translateY(-1px);box-shadow:0 4px 12px rgba(10,22,52,.25)}
.btn-ghost{background:var(--white);border:1px solid var(--border2);border-radius:5px;padding:7px 14px;font-family:'Lato',sans-serif;font-size:12px;font-weight:700;color:var(--text2);cursor:pointer;transition:all .12s}
.btn-ghost:hover{background:var(--off);border-color:var(--navy);color:var(--navy)}
.btn-red{background:var(--rdim);border:1px solid #f5c0c9;border-radius:5px;padding:7px 12px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;color:var(--red);cursor:pointer}
.note-in{background:var(--off);border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-family:'Lato',sans-serif;font-size:12px;color:var(--text);outline:none;flex:1;transition:border .12s}
.note-in::placeholder{color:var(--text4)}.note-in:focus{border-color:var(--navy);background:var(--white)}
.done-btn{background:var(--white);border:1px solid var(--border2);border-radius:5px;padding:7px 12px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;color:var(--text3);cursor:pointer;flex-shrink:0;transition:all .12s}
.done-btn.done{background:var(--gdim);border-color:#a8e8cc;color:var(--green)}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.col{display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:12px}

/* DATA ROWS */
.dr{display:flex;align-items:center;padding:10px 8px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:background .1s;margin:0 -8px;border-radius:5px}
.dr:last-child{border-bottom:none}.dr:hover{background:var(--off)}
.pri-bar{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:18px}

/* SECTION HEADER */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sh-t{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--text3)}

/* STAT BOX */
.stat{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:16px;box-shadow:var(--shadow)}
.stat .lbl{margin-bottom:6px;display:block}
.stat .val{font-size:28px;font-weight:900;line-height:1;color:var(--navy)}
.stat .sub{font-size:11px;color:var(--text3);margin-top:4px}

/* AI MODAL */
#ai-ov{position:fixed;inset:0;background:rgba(10,22,52,.55);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#ai-ov.hidden{display:none}
#ai-p{background:var(--white);border:1px solid var(--border2);border-top:3px solid var(--navy);border-radius:10px 10px 0 0;width:100%;max-width:740px;max-height:58vh;display:flex;flex-direction:column;animation:slideUp .2s ease;box-shadow:0 -8px 40px rgba(10,22,52,.15)}
.ai-hdr{display:flex;align-items:center;gap:8px;padding:13px 18px;border-bottom:1px solid var(--border)}
.ai-dot{width:7px;height:7px;border-radius:50%;background:var(--navy);animation:pulse 2s infinite}
.ai-ttl{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--navy)}
.ai-chip{font-size:10px;color:var(--text3);background:var(--off);padding:2px 8px;border-radius:3px;font-weight:700}
.ai-x{margin-left:auto;background:var(--off);border:1px solid var(--border);border-radius:4px;width:24px;height:24px;cursor:pointer;color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center}
.ai-x:hover{background:var(--off2);color:var(--navy)}
.ai-body{flex:1;overflow-y:auto;padding:18px 18px}
.ai-out{font-size:13px;color:var(--text2);line-height:2;white-space:pre-wrap}
.ai-load{display:flex;flex-direction:column;gap:9px}
.ai-msg{font-size:11px;color:var(--text3);margin-bottom:4px;font-style:italic}
.sk{height:9px;background:var(--off2);border-radius:3px;animation:shimmer 1.4s infinite}

/* DRILL PANEL */
#dr-ov{position:fixed;inset:0;background:rgba(10,22,52,.4);z-index:400;display:flex;align-items:center;justify-content:flex-end;backdrop-filter:blur(2px)}
#dr-ov.hidden{display:none}
#dr-p{background:var(--white);border-left:1px solid var(--border2);width:400px;height:100%;display:flex;flex-direction:column;animation:slideIn .2s ease;overflow-y:auto;box-shadow:-8px 0 32px rgba(10,22,52,.12)}
.dr-hdr{padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--white);z-index:5;display:flex;align-items:flex-start;gap:12px}
.dr-back{background:var(--off);border:1px solid var(--border2);border-radius:4px;padding:5px 12px;cursor:pointer;font-family:'Lato',sans-serif;font-size:10px;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.dr-back:hover{background:var(--off2);color:var(--navy)}
.dr-ttl{font-size:19px;font-weight:900;text-transform:uppercase;letter-spacing:.01em;line-height:1;color:var(--navy)}
.dr-sub{font-size:11px;color:var(--text3);margin-top:3px}
.dr-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}

/* CHART */
.chart{display:flex;gap:6px;align-items:flex-end;height:90px}
.cc{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.cpair{display:flex;gap:2px;align-items:flex-end;width:100%}
.cb{flex:1;min-height:3px;border-radius:2px 2px 0 0}
.clbl{font-size:9px;color:var(--text3);font-weight:900;letter-spacing:.04em}

/* REGION CARD */
.rcard{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:16px;cursor:pointer;display:flex;gap:16px;align-items:center;transition:all .15s;box-shadow:var(--shadow)}
.rcard:hover{box-shadow:var(--shadow2);border-color:var(--border2);transform:translateY(-1px)}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-sq">A</div>
      <div>
        <div class="logo-name">AMP Signal</div>
        <div class="logo-sub">Sales Intelligence</div>
      </div>
    </div>
    <div class="tb-sep"></div>
    <span class="demo-label">Demo View</span>
    <div class="ptabs" id="ptabs"></div>
    <div class="tb-r">
      <div class="live-tag"><div class="live-dot"></div>LIVE</div>
      <button class="brief-btn" id="brief-btn">✦ Signal Brief</button>
      <div class="user-box" id="ubox">RM</div>
    </div>
  </div>

  <div id="notif">
    <div class="notif-pill">Scatter Alert</div>
    <span class="notif-txt"><b>$218K Q2 prime returned — Baltimore WBFF</b> · OSI · 72-hr window · 3 matching accounts in Dynamics</span>
    <button class="notif-x" onclick="document.getElementById('notif').classList.add('hidden')">×</button>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sb-hd" style="margin-bottom:8px">Navigation</div>
      <div id="nb-list"></div>
      <div class="sb-div"></div>
      <div class="sb-hd" style="margin-bottom:8px">Critical Few</div>
      <div class="cf-sb" id="cf-sb"></div>
      <div class="sb-bot">
        <div class="src"><div class="src-d"></div><span class="src-l">OSI Traffic</span></div>
        <div class="src"><div class="src-d"></div><span class="src-l">MS Dynamics CRM</span></div>
      </div>
    </div>
    <div id="content"><div id="ci"></div></div>
  </div>
</div>

<div id="ai-ov" class="hidden" onclick="if(event.target===this)closeAI()">
  <div id="ai-p">
    <div class="ai-hdr">
      <div class="ai-dot"></div>
      <span class="ai-ttl">Signal AI</span>
      <span class="ai-chip" id="ai-chip"></span>
      <div class="ai-x" onclick="closeAI()">×</div>
    </div>
    <div class="ai-body" id="ai-b"></div>
  </div>
</div>

<div id="dr-ov" class="hidden" onclick="if(event.target===this)closeDrill()">
  <div id="dr-p">
    <div class="dr-hdr">
      <button class="dr-back" onclick="closeDrill()">← Back</button>
      <div>
        <div class="dr-ttl" id="dr-ttl"></div>
        <div class="dr-sub" id="dr-sub"></div>
      </div>
    </div>
    <div class="dr-body" id="dr-body"></div>
  </div>
</div>

<script>

const gc=p=>p>=100?'var(--green)':p>=88?'var(--amber)':'var(--red)';

  {id:'r5',name:'Las Vegas / Reno',    vp:'Joel Sandoval', pct:85, digital:22,health:66,revenue:11200000,goal:13200000,sellers:62, newBiz:5, markets:'KSNV, KRXI, KRNV',topRisk:'Pacing gap widening'},
  {id:'r6',name:'Salt Lake / Boise',   vp:'Angela Kim',    pct:103,digital:34,health:92,revenue:19800000,goal:19200000,sellers:94, newBiz:13,markets:'KUTV, KMYU, KBOI',topRisk:'CTV inventory tightening'},
  {id:'r7',name:'Tulsa / Little Rock', vp:'Darnell Price',  pct:81, digital:17,health:53,revenue:10400000,goal:12800000,sellers:71, newBiz:2, markets:'KTUL, KATV, KFSM',topRisk:'Below pace — needs intervention'},
  {id:'r8',name:'Pittsburgh / Roanoke',vp:'Sonia Reyes',   pct:97, digital:30,health:82,revenue:16600000,goal:17200000,sellers:83, newBiz:9, markets:'WJAC, WPGH, WSET',topRisk:'Scatter capture window open'},
];

const CF=[
  {id:1,title:'Digital Mix',       current:24,target:35, unit:'%',     status:'behind'  },
  {id:2,title:'Political Scatter', current:68,target:100,unit:'%',     status:'on-track'},
  {id:3,title:'Lapsed Auto',       current:41,target:60, unit:'%',     status:'behind'  },
  {id:4,title:'New Business',      current:9, target:12, unit:' accts',status:'at-risk' },
  {id:5,title:'CTV Sell-Through',  current:79,target:85, unit:'%',     status:'on-track'},
];

const SELLERS=[

async function openAI(key,label,live=false,prompt=''){
  document.getElementById('ai-ov').classList.remove('hidden');
  document.getElementById('ai-chip').textContent=label;
  const b=document.getElementById('ai-b');
  b.innerHTML=`<div class="ai-load"><div class="ai-msg">Analyzing OSI + Dynamics data for ${label}...</div>${[88,70,82,60].map((w,i)=>`<div class="sk" style="width:${w}%;animation-delay:${i*.12}s"></div>`).join('')}</div>`;
  clearInterval(tyT);
  if(live){
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'You are Signal AI inside AMP Signal, Sinclair Broadcast Group\'s sales intelligence platform. You have OSI traffic data and MS Dynamics CRM access. Be sharp, data-specific, and action-oriented. SITUATION / IMPACT / MOVE structure. Reference Sinclair markets (Baltimore WBFF, Seattle KOMO, Columbus WSYX, Salt Lake KUTV, etc.) where relevant. Keep it tight.',
          messages:[{role:'user',content:prompt}]})});
      const d=await r.json();
      const txt=d.content?.[0]?.text||'Unable to generate analysis.';
      b.innerHTML=`<div class="ai-out" id="ao"></div>`;
      type(document.getElementById('ao'),txt);
    }catch(e){fb(key,b);}
  } else {
    setTimeout(()=>fb(key,b),700+Math.random()*300);
  }
}
function fb(key,b){const t=AI[key]||AI.talking;b.innerHTML=`<div class="ai-out" id="ao"></div>`;type(document.getElementById('ao'),t);}
function type(el,txt){let i=0;clearInterval(tyT);tyT=setInterval(()=>{if(i<txt.length){el.textContent=txt.slice(0,++i);}else clearInterval(tyT);},11);}
function closeAI(){clearInterval(tyT);document.getElementById('ai-ov').classList.add('hidden');}

        ${q.type==='risk'?`<button class="btn-red" onclick="openAI('renewal','Rescue Plan',true,'Sun Valley Toyota, Salt Lake/KUTV. Renewal at risk: 58% decline, May 28 deadline, 11 days no contact. Rescue plan with meeting agenda and fallbacks.')">Rescue Plan</button>`:''}
        <input class="note-in" placeholder="Note..." value="${S.notes['q_'+q.id]||''}" oninput="S.notes['q_${q.id}']=this.value" style="font-size:11px">
        <button class="done-btn ${S.done['q_'+q.id]?'done':''}" onclick="toggleD('q_${q.id}')">${S.done['q_'+q.id]?'Done ✓':'Mark Done'}</button>
      </div>
    </div>`).join('')}
  </div>`;
}

function switchP(p){S.persona=p;S.tab=NAV[p][0].l;render()}
function switchT(t){S.tab=t;render()}
function toggleD(k){S.done[k]=!S.done[k];render()}
render();
</script>
</body>
</html>
