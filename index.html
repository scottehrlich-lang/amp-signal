<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AMP Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  /* AMP exact brand colors from ampmediasales.com */
  --navy:    #0a1634;
  --navy2:   #0d1c3f;
  --navy3:   #111f45;
  --navy4:   #162550;
  --navy5:   #1d2e5e;
  --navy6:   #243468;
  --teal:    #00ffae;
  --teal2:   #00e89e;
  --teal-d:  rgba(0,255,174,.12);
  --teal-m:  rgba(0,255,174,.25);
  --white:   #ffffff;
  --w2:      #c8d4e8;
  --w3:      #7a90b0;
  --w4:      #4a6080;
  --green:   #00ffae;
  --gdim:    rgba(0,255,174,.12);
  --red:     #ff4d6a;
  --rdim:    rgba(255,77,106,.12);
  --amber:   #ffbb33;
  --adim:    rgba(255,187,51,.12);
  --blue:    #4ea8ff;
  --border:  rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Lato',sans-serif;background:var(--navy);color:var(--white);font-size:13px;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--navy5)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes shimmer{0%,100%{opacity:.25}50%{opacity:.55}}

/* TOPBAR */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{
  height:52px;background:var(--navy2);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0
}
.logo{display:flex;align-items:center;gap:10px;margin-right:20px}
.logo-sq{
  width:32px;height:32px;background:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-family:'Lato',sans-serif;font-weight:900;font-size:13px;
  color:var(--navy);letter-spacing:.02em
}
.logo-name{font-family:'Lato',sans-serif;font-weight:900;font-size:16px;letter-spacing:.04em;text-transform:uppercase;color:var(--white)}
.logo-name span{color:var(--teal)}
.logo-sub{font-size:9px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:var(--w3)}

.tb-sep{width:1px;height:22px;background:var(--border);margin:0 16px;flex-shrink:0}

.demo-label{font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--w4);border:1px solid var(--navy5);padding:3px 8px;margin-right:10px}

.ptabs{display:flex;gap:2px;background:var(--navy3);border:1px solid var(--border);padding:3px}
.ptab{background:none;border:none;padding:4px 12px;font-family:'Lato',sans-serif;font-size:10px;font-weight:900;color:var(--w3);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:all .12s}
.ptab:hover{color:var(--white)}
.ptab.on{background:var(--teal);color:var(--navy)}

.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-tag{display:flex;align-items:center;gap:5px;border:1px solid rgba(0,255,174,.4);padding:3px 10px;font-size:10px;font-weight:900;color:var(--teal);letter-spacing:.1em;text-transform:uppercase}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
.brief-btn{background:var(--teal);border:none;padding:7px 18px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);cursor:pointer;transition:background .12s}
.brief-btn:hover{background:var(--teal2)}
.user-box{width:30px;height:30px;background:var(--navy4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--w2);letter-spacing:.04em}

/* NOTIF */
#notif{background:rgba(0,255,174,.06);border-bottom:2px solid var(--teal);padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#notif.hidden{display:none}
.notif-pill{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;background:var(--teal);color:var(--navy);padding:3px 9px;flex-shrink:0}
.notif-txt{font-size:12px;color:var(--w2);flex:1}.notif-txt b{color:var(--teal);font-weight:900}
.notif-x{background:none;border:none;color:var(--w3);cursor:pointer;font-size:16px;line-height:1;padding:0}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:192px;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:14px 0}
.sb-hd{font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--w4);padding:0 14px;margin-bottom:6px}
.nb{width:100%;background:none;border:none;padding:8px 14px;font-family:'Lato',sans-serif;font-size:13px;font-weight:400;color:var(--w3);cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .1s;border-left:2px solid transparent;margin-bottom:1px}
.nb:hover{background:var(--navy3);color:var(--white)}
.nb.on{background:var(--navy3);color:var(--white);font-weight:900;border-left-color:var(--teal)}
.nb-ic{font-size:10px;opacity:.4;width:14px;text-align:center}.nb.on .nb-ic{opacity:1;color:var(--teal)}
.sb-div{height:1px;background:var(--border);margin:12px 14px}
.cf-sb{padding:0 14px}
.cfm{margin-bottom:9px}
.cfm-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.cfm-n{font-size:10px;color:var(--w4)}.cfm-v{font-family:'Space Mono',monospace;font-size:9px;font-weight:700}
.mtrack{height:3px;background:var(--navy4);overflow:hidden}.mfill{height:100%}
.sb-bot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.src{display:flex;align-items:center;gap:7px;padding:3px 0}
.src-d{width:4px;height:4px;border-radius:50%;background:var(--teal)}
.src-l{font-size:10px;color:var(--w4)}

/* CONTENT */
#content{flex:1;overflow-y:auto;background:var(--navy)}
#ci{padding:20px 22px 32px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.pt{font-size:24px;font-weight:900;letter-spacing:.01em;text-transform:uppercase;line-height:1}
.ps{font-size:11px;color:var(--w3);margin-top:4px;font-weight:400}

/* SURFACES */
.s{background:var(--navy2);border:1px solid var(--border);padding:18px}
.s-sm{background:var(--navy2);border:1px solid var(--border);padding:14px}
.s-dark{background:var(--navy3);border:1px solid var(--border);padding:18px}

/* HERO TEAL — exact AMP brand treatment */
.hero-teal{
  background:var(--teal);padding:22px 24px;color:var(--navy);
  position:relative;overflow:hidden
}
.hero-teal .lbl{color:rgba(10,22,52,.55)}
.hero-teal .num-xl,.hero-teal .num-lg{color:var(--navy)}

/* TYPOGRAPHY */
.lbl{font-size:9px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:var(--w3)}
.num-xl{font-size:48px;font-weight:900;letter-spacing:-.02em;line-height:1}
.num-lg{font-size:30px;font-weight:900;letter-spacing:-.01em;line-height:1}
.num-md{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1}
.num-sm{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.num-xs{font-family:'Space Mono',monospace;font-size:11px}

/* TAGS */
.tag{display:inline-flex;align-items:center;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px}
.tag-teal{background:var(--teal);color:var(--navy)}
.tag-green{background:var(--gdim);color:var(--teal);border:1px solid rgba(0,255,174,.25)}
.tag-red{background:var(--rdim);color:var(--red);border:1px solid rgba(255,77,106,.25)}
.tag-amber{background:var(--adim);color:var(--amber);border:1px solid rgba(255,187,51,.25)}
.tag-dim{background:var(--navy4);color:var(--w3);border:1px solid var(--border2)}
.tag-blue{background:rgba(78,168,255,.1);color:var(--blue);border:1px solid rgba(78,168,255,.2)}

/* PROGRESS */
.track{background:var(--navy4);overflow:hidden}.fill{height:100%;transition:width .7s ease}

/* BUTTONS */
.btn-ai{background:var(--teal);border:none;padding:7px 14px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);cursor:pointer;transition:background .12s;white-space:nowrap}
.btn-ai:hover{background:var(--teal2)}
.btn-ghost{background:var(--navy3);border:1px solid var(--border2);padding:7px 12px;font-family:'Lato',sans-serif;font-size:12px;font-weight:400;color:var(--w2);cursor:pointer;transition:all .12s}
.btn-ghost:hover{background:var(--navy4);color:var(--white)}
.btn-red{background:var(--rdim);border:1px solid rgba(255,77,106,.25);padding:7px 12px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;color:var(--red);cursor:pointer}
.note-in{background:var(--navy3);border:1px solid var(--border);padding:6px 10px;font-family:'Lato',sans-serif;font-size:12px;color:var(--white);outline:none;flex:1;transition:border .12s}
.note-in::placeholder{color:var(--w4)}.note-in:focus{border-color:var(--teal)}
.done-btn{background:var(--navy3);border:1px solid var(--border2);padding:6px 12px;font-family:'Lato',sans-serif;font-size:11px;font-weight:900;color:var(--w3);cursor:pointer;flex-shrink:0;transition:all .12s}
.done-btn.done{background:var(--gdim);border-color:rgba(0,255,174,.25);color:var(--teal)}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.col{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:12px}

/* DATA ROWS */
.dr{display:flex;align-items:center;padding:10px 6px;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:background .1s;margin:0 -6px}
.dr:last-child{border-bottom:none}.dr:hover{background:var(--navy3)}
.pri-bar{width:3px;flex-shrink:0;align-self:stretch;min-height:18px}

/* SECTION HEADER */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sh-t{font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--w3)}

/* AI MODAL */
#ai-ov{position:fixed;inset:0;background:rgba(10,22,52,.85);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
#ai-ov.hidden{display:none}
#ai-p{background:var(--navy2);border:1px solid var(--border2);border-top:3px solid var(--teal);width:100%;max-width:740px;max-height:56vh;display:flex;flex-direction:column;animation:slideUp .2s ease;box-shadow:0 -20px 60px rgba(0,0,0,.5)}
.ai-hdr{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border)}
.ai-dot{width:6px;height:6px;background:var(--teal);animation:pulse 2s infinite}
.ai-ttl{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--teal)}
.ai-chip{font-size:10px;color:var(--w3);background:var(--navy3);padding:2px 8px;font-weight:400}
.ai-x{margin-left:auto;background:var(--navy3);border:1px solid var(--border);width:24px;height:24px;cursor:pointer;color:var(--w2);font-size:14px;display:flex;align-items:center;justify-content:center}
.ai-body{flex:1;overflow-y:auto;padding:16px 18px}
.ai-out{font-size:13px;color:var(--w2);line-height:2;white-space:pre-wrap}
.ai-load{display:flex;flex-direction:column;gap:8px}
.ai-msg{font-size:11px;color:var(--w3);font-style:italic;margin-bottom:4px}
.sk{height:8px;background:var(--navy4);animation:shimmer 1.4s infinite}

/* DRILL PANEL */
#dr-ov{position:fixed;inset:0;background:rgba(10,22,52,.75);z-index:400;display:flex;align-items:center;justify-content:flex-end;backdrop-filter:blur(2px)}
#dr-ov.hidden{display:none}
#dr-p{background:var(--navy2);border-left:1px solid var(--border2);width:400px;height:100%;display:flex;flex-direction:column;animation:slideIn .2s ease;overflow-y:auto}
.dr-hdr{padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--navy2);z-index:5;display:flex;align-items:flex-start;gap:12px}
.dr-back{background:var(--navy3);border:1px solid var(--border2);padding:5px 12px;cursor:pointer;font-family:'Lato',sans-serif;font-size:10px;font-weight:900;color:var(--w2);text-transform:uppercase;letter-spacing:.06em}
.dr-ttl{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:.01em;line-height:1}
.dr-sub{font-size:11px;color:var(--w3);margin-top:3px}
.dr-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}

/* CHART */
.chart{display:flex;gap:5px;align-items:flex-end;height:90px}
.cc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.cpair{display:flex;gap:2px;align-items:flex-end;width:100%}
.cb{flex:1;min-height:3px}
.clbl{font-size:9px;color:var(--w3);font-weight:900;letter-spacing:.04em}
</style>
</head>

async function openAI(key,label,live=false,prompt=''){
  document.getElementById('ai-ov').classList.remove('hidden');
  document.getElementById('ai-chip').textContent=label;
  const b=document.getElementById('ai-b');
  b.innerHTML=`<div class="ai-load"><div class="ai-msg">Analyzing OSI + Dynamics data...</div>${[88,72,80,60].map((w,i)=>`<div class="sk" style="width:${w}%;animation-delay:${i*.12}s"></div>`).join('')}</div>`;
  clearInterval(tyT);
  if(live){
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'You are Signal AI inside AMP Signal, Sinclair Broadcast Group\'s sales intelligence platform. You have OSI traffic data and MS Dynamics CRM access. Be sharp and action-oriented. SITUATION / IMPACT / MOVE structure. Reference Sinclair markets (Baltimore WBFF, Seattle KOMO, Columbus WSYX, Salt Lake KUTV, etc.) where relevant.',
          messages:[{role:'user',content:prompt}]})});
      const d=await r.json();
      const txt=d.content?.[0]?.text||'Unable to generate analysis.';
      b.innerHTML=`<div class="ai-out" id="ai-out"></div>`;
      type(document.getElementById('ai-out'),txt);
    }catch(e){fallback(key,b);}
  } else {
    setTimeout(()=>fallback(key,b),600+Math.random()*300);
  }
}
function fallback(key,b){const txt=AI[key]||AI.talking;b.innerHTML=`<div class="ai-out" id="ai-out"></div>`;type(document.getElementById('ai-out'),txt);}
function type(el,txt){let i=0;clearInterval(tyT);tyT=setInterval(()=>{if(i<txt.length){el.textContent=txt.slice(0,++i);}else clearInterval(tyT);},12);}
function closeAI(){clearInterval(tyT);document.getElementById('ai-ov').classList.add('hidden');}

        <div class="s"><div class="sh"><span class="sh-t">Top Actions Today</span></div>${QUEUE.slice(0,3).map(q=>`<div class="dr" onclick="drillQueue('${q.id}')"><div class="pri-bar" style="background:${q.pri==='P1'?'var(--red)':'var(--amber)'}"></div><div style="flex:1"><div style="font-size:12px;font-weight:900;margin-bottom:2px">${q.account}</div><div style="font-size:11px;color:var(--w3)">${q.action}</div></div><div style="font-size:11px;font-weight:900;color:${q.due==='Today'?'var(--red)':'var(--amber)'};flex-shrink:0">${q.due}</div></div>`).join('')}</div>
        <div class="s"><div class="sh"><span class="sh-t">Critical Few</span></div>${CF.map(cf=>{const sc=cfC(cf.status);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;color:var(--w2)">${cf.title}</span><span class="num-xs" style="color:${sc}">${cf.current}${cf.unit}</span></div>${bar(Math.round(cf.current/cf.target*100),sc,5)}</div>`;}).join('')}</div>
      </div>
    </div>`;
  }
  return `<div class="col"><div class="g4">${[{l:'MARKET REVENUE',v:fmt(16600000),sub:'97% of $17.2M',c:'var(--amber)'},{l:'DIGITAL MIX',v:'30%',sub:'Target 35%',c:'var(--amber)'},{l:'TEAM SIZE',v:'10',sub:'active sellers',c:'var(--white)'},{l:'RENEWAL RISKS',v:'7',sub:'this month',c:'var(--red)'}].map(m=>`<div class="s-sm"><div class="lbl" style="margin-bottom:7px">${m.l}</div><div class="num-md" style="color:${m.c}">${m.v}</div><div style="font-size:11px;color:var(--w4);margin-top:3px">${m.sub}</div></div>`).join('')}</div>
  <div class="g2"><div class="s"><div class="sh"><span class="sh-t">Critical Few Status</span></div>${CF.map(cf=>{const sc=cfC(cf.status);return`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><span style="font-size:12px;font-weight:900">${cf.title}</span>${tag(cfL(cf.status),cfT(cf.status))}</div>${bar(Math.round(cf.current/cf.target*100),sc,7)}</div>`;}).join('')}</div>
  <div class="s"><div class="sh"><span class="sh-t">8 Regions</span></div>${REGIONS.map(r=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:9px"><div style="width:5px;height:5px;background:${gc(r.pct)};flex-shrink:0"></div><div style="flex:1"><div style="font-size:11px;font-weight:900;margin-bottom:3px">${r.name}</div>${bar(r.pct,null,4)}</div><span class="num-xs" style="color:${gc(r.pct)}">${r.pct}%</span></div>`).join('')}</div></div></div>`;
}

function rRegions(){
  return `<div class="col">${REGIONS.map(r=>`<div onclick="drillRegion('${r.id}')" style="background:var(--navy2);border:1px solid ${r.pct<88?'rgba(255,77,106,.2)':r.pct>=100?'rgba(0,255,174,.15)':'var(--border)'};padding:16px;cursor:pointer;display:flex;gap:16px;align-items:center;transition:background .12s" onmouseover="this.style.background='var(--navy3)'" onmouseout="this.style.background='var(--navy2)'">
  <div style="width:54px;height:40px;background:${r.pct>=100?'var(--teal)':r.pct>=88?'var(--adim)':'var(--rdim)'};display:flex;align-items:center;justify-content:center;flex-shrink:0">
    <span style="font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:${r.pct>=100?'var(--navy)':gc(r.pct)}">${r.pct}%</span>
  </div>
  <div style="flex:1.5"><div style="font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.01em;margin-bottom:2px">${r.name}</div><div style="font-size:11px;color:var(--w3)">${r.vp} · ${r.markets}</div></div>
  <div style="flex:2">${bar(r.pct,null,7)}<div style="display:flex;justify-content:space-between;margin-top:5px"><span class="num-xs" style="color:var(--w3)">${fmt(r.revenue)}</span><span class="num-xs" style="color:var(--w3)">${fmt(r.goal)}</span></div></div>
  <div style="display:flex;gap:18px;flex-shrink:0">
    <div style="text-align:center"><div class="lbl" style="margin-bottom:4px">Digital</div><div class="num-sm" style="color:${r.digital>=28?'var(--teal)':'var(--amber)'}">${r.digital}%</div></div>
    <div style="text-align:center"><div class="lbl" style="margin-bottom:4px">Health</div><div class="num-sm" style="color:${r.health>=80?'var(--teal)':r.health>=65?'var(--amber)':'var(--red)'}">${r.health}</div></div>
  </div>
  ${r.pct<88?tag('INTERVENE','red'):r.pct>=100?tag('ABOVE GOAL','green'):''}
  <span style="color:var(--w3);font-size:16px;flex-shrink:0">›</span>
</div>`).join('')}</div>`;
}

function rCF(){
  return `<div class="col"><div class="s" style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:16px;font-weight:900;text-transform:uppercase;letter-spacing:.04em">Critical Few Priority Tracker</div><div style="font-size:11px;color:var(--w3);margin-top:3px">Set by Ryan Moore, CRO · Cascaded to 847 sellers via OSI + Dynamics</div></div><button class="btn-ai" onclick="openAI('${S.persona==='ae'?'briefae':'briefcro'}','CF Analysis')">AI Analysis</button></div>
  ${CF.map((cf,i)=>{const sc=cfC(cf.status);return`<div class="s" style="border-left:3px solid ${sc}"><div style="display:flex;gap:16px;align-items:center"><div style="flex:1"><div style="display:flex;gap:10px;align-items:center;margin-bottom:10px"><span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--w4)">CF-${i+1}</span><span style="font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.03em">${cf.title}</span>${tag(cfL(cf.status),cfT(cf.status))}</div>${bar(Math.round(cf.current/cf.target*100),sc,10)}<div style="display:flex;justify-content:space-between;margin-top:5px"><span style="font-size:10px;color:var(--w4)">0${cf.unit}</span><span style="font-size:10px;color:var(--w4)">Target: ${cf.target}${cf.unit}</span></div></div><div style="text-align:right;flex-shrink:0"><div class="num-lg" style="color:${sc}">${cf.current}${cf.unit}</div><div style="font-size:11px;color:var(--w3);margin-top:4px">of ${cf.target}${cf.unit}</div></div></div></div>`;}).join('')}</div>`;
}

function rPacing(){
  const months=[{m:'Nov',a:5820,g:6200},{m:'Dec',a:7140,g:6800},{m:'Jan',a:5990,g:6100},{m:'Feb',a:6230,g:6300},{m:'Mar',a:7010,g:6900},{m:'Apr',a:6840,g:7100}];
  const prods=[{n:'Linear TV',r:3820,g:3900,p:98,c:'var(--amber)'},{n:'CTV/OTT',r:1240,g:1300,p:95,c:'#a78bfa'},{n:'Digital',r:680,g:920,p:74,c:'var(--blue)'},{n:'Social',r:510,g:580,p:88,c:'#06b6d4'},{n:'Audio',r:380,g:320,p:119,c:'var(--teal)'},{n:'Sports',r:210,g:280,p:75,c:'var(--w3)'}];
  const mx=Math.max(...months.flatMap(m=>[m.a,m.g]));
  return `<div class="col"><div class="s"><div class="sh"><span class="sh-t">Monthly Revenue vs. Goal</span><button class="btn-ai" style="font-size:11px;padding:5px 12px" onclick="openAI('briefcro','Pacing Analysis')">Analyze</button></div>
  <div class="chart">${months.map(m=>`<div class="cc"><div class="cpair" style="height:80px"><div class="cb" style="background:var(--navy4);height:${(m.g/mx)*80}px"></div><div class="cb" style="background:${m.a>=m.g?'var(--teal)':'var(--blue)'};height:${(m.a/mx)*80}px"></div></div><div class="clbl">${m.m}</div></div>`).join('')}</div>
  <div style="display:flex;gap:16px;margin-top:12px">${[['var(--navy4)','Goal'],['var(--blue)','Actual'],['var(--teal)','Beat']].map(([c,l])=>`<div style="display:flex;gap:5px;align-items:center"><div style="width:10px;height:10px;background:${c}"></div><span style="font-size:10px;color:var(--w3)">${l}</span></div>`).join('')}</div></div>
  <div class="s"><div class="sh"><span class="sh-t">Sell-Through by Product — OSI Data</span></div>
  ${prods.map(p=>`<div style="margin-bottom:13px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><div style="display:flex;gap:8px;align-items:center"><div style="width:7px;height:7px;background:${p.c}"></div><span style="font-size:12px;font-weight:900">${p.n}</span>${p.p>=110?tag('BEATING GOAL','green'):''}${p.p<80?tag('NEEDS PUSH','red'):''}</div><div style="display:flex;gap:12px;align-items:center"><span class="num-xs" style="color:var(--w3)">$${p.r}K / $${p.g}K</span><span class="num-sm" style="color:${gc(p.p)};width:42px;text-align:right">${p.p}%</span></div></div>${bar(p.p,p.c,7)}</div>`).join('')}</div></div>`;
}

function rMargin(){
  const m=MARGIN,mx=Math.max(...m.products.map(p=>p.margin));
  return `<div class="col"><div class="hero-teal">
    <div style="display:flex;gap:28px;align-items:flex-end;flex-wrap:wrap;margin-bottom:14px">
      <div><div class="lbl" style="color:rgba(10,22,52,.5);margin-bottom:8px">Blended Margin</div><div class="num-xl">${m.current}%</div><div style="font-size:13px;font-weight:900;color:rgba(10,22,52,.6);margin-top:6px">+${(m.current-m.prior).toFixed(1)}pts YTD vs ${m.prior}% prior year</div></div>
      <div style="flex:1;min-width:180px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:10px;font-weight:900;color:rgba(10,22,52,.5);text-transform:uppercase;letter-spacing:.08em">Progress to ${m.target}% target</span><span style="font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:rgba(10,22,52,.6)">${(m.target-m.current).toFixed(1)}pts to go</span></div><div style="background:rgba(10,22,52,.2);height:7px;overflow:hidden"><div style="width:${(m.current/m.target)*100}%;height:100%;background:var(--navy)"></div></div></div>
      <div><div style="font-size:10px;font-weight:900;color:rgba(10,22,52,.5);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">6-Month Trend</div><div style="display:flex;gap:4px;align-items:flex-end;height:36px">${m.trend.map((v,i)=>`<div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div style="width:14px;height:${Math.max(3,((v-26)/16)*32)}px;background:${i===m.trend.length-1?'var(--navy)':'rgba(10,22,52,.25)'}"></div><div style="font-size:8px;color:rgba(10,22,52,.5);font-weight:900">${m.labels[i]}</div></div>`).join('')}</div></div>
    </div>
    <div style="background:rgba(10,22,52,.1);padding:10px 14px;font-size:12px;color:rgba(10,22,52,.6);line-height:1.6">Every 1pt gain in digital mix adds ~0.8pts to blended margin. Linear TV is 41.6% of revenue at only 31% margin.</div>
  </div>
  <div class="g32">
    <div class="s"><div class="sh"><span class="sh-t">Margin by Product Line</span><button class="btn-ai" style="font-size:11px;padding:5px 12px" onclick="openAI('margin','Margin Analysis')">AI Analysis</button></div>
    ${m.products.map(p=>`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px"><div style="display:flex;gap:8px;align-items:center"><div style="width:7px;height:7px;background:${p.color}"></div><span style="font-size:12px;font-weight:900">${p.name}</span><span style="font-size:10px;color:var(--w3)">($${p.rev}K)</span></div><div style="display:flex;gap:12px;align-items:center"><span style="font-size:10px;color:var(--w3)">${p.contrib}%</span><span class="num-sm" style="color:${p.margin>=50?'var(--teal)':p.margin>=35?'var(--amber)':'var(--w3)'};width:38px;text-align:right">${p.margin}%</span><span style="font-size:11px;color:${trc(p.trend)};width:12px">${tr(p.trend)}</span></div></div><div class="track" style="height:7px"><div class="fill" style="width:${(p.margin/mx)*100}%;background:${p.color};height:100%"></div></div></div>`).join('')}</div>
    <div class="s"><div class="sh"><span class="sh-t">Margin by Region</span></div>
    ${m.regions.map((r,i)=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:11px"><div style="width:22px;height:22px;background:var(--navy4);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:var(--w3);flex-shrink:0">${i+1}</div><div style="flex:1"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:11px;font-weight:900">${r.name}</span><div style="display:flex;align-items:center;gap:6px"><span style="color:${trc(r.trend)};font-size:11px">${tr(r.trend)}</span><span class="num-xs" style="color:${r.margin>=36?'var(--teal)':r.margin>=32?'var(--amber)':'var(--red)'}">${r.margin}%</span></div></div><div class="track" style="height:5px"><div class="fill" style="width:${(r.margin/42)*100}%;background:${r.margin>=36?'var(--teal)':r.margin>=32?'var(--amber)':'var(--red)'};height:100%"></div></div></div></div>`).join('')}
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--w3);line-height:1.6"><b style="color:var(--red)">Watch:</b> Columbus/Dayton (28.4%) and Tulsa/Little Rock (27.1%) are margin drags.</div></div>
  </div></div>`;
}

function rTeam(){
  return `<div class="col">
  <div class="s" style="border-left:3px solid var(--red)"><span style="font-size:11px;font-weight:900;color:var(--red);text-transform:uppercase;letter-spacing:.06em">Action Needed: </span><span style="font-size:12px;color:var(--w2)">Sun Valley Toyota renewal May 28 — 11 days no Dynamics contact, OSI shows 58% spend decline. Assign Jordan Patel urgent call today.</span></div>
  ${SELLERS.map(s=>`<div class="s" style="opacity:${S.done['sl_'+s.id]?.5:1}">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
      <div onclick="drillSeller('${s.id}')" style="width:38px;height:38px;background:var(--navy4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:${gc(s.pct)};flex-shrink:0;cursor:pointer">${s.name.split(' ').map(n=>n[0]).join('')}</div>
      <div style="flex:1;cursor:pointer" onclick="drillSeller('${s.id}')"><div style="font-size:13px;font-weight:900">${s.name}</div><div style="font-size:11px;color:var(--w3)">${s.title}</div></div>
      <div style="flex:1.5">${bar(s.pct,null,7)}<div style="display:flex;justify-content:space-between;margin-top:4px"><span class="num-xs" style="color:var(--w3)">${fmt(s.revenue)}</span><span class="num-xs" style="color:${gc(s.pct)}">${s.pct}%</span></div></div>
      <div style="display:flex;gap:5px">${s.risk>0?tag(`${s.risk} risk`,'red'):''}${tag(`${s.digital}% dig`,s.digital>=28?'green':'amber')}</div>
      <button class="btn-ai" style="font-size:11px;padding:6px 12px" onclick="openAI('talking','Coach: ${s.name}',true,'Seller: ${s.name}. Category: ${s.title}. Pacing: ${s.pct}% (${fmt(s.revenue)} vs ${fmt(s.goal)}). Digital: ${s.digital}% vs 35%. New biz: ${s.newBiz} vs 4 target. At-risk: ${s.risk}. Last contact: ${s.lastContact}. Coaching brief with 3 specific action items.')">Coach</button>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span style="font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:var(--w4);flex-shrink:0">Note</span>
      <input class="note-in" placeholder="Add note for ${s.name.split(' ')[0]}..." value="${S.notes['sl_'+s.id]||''}" oninput="S.notes['sl_${s.id}']=this.value">
      <button class="done-btn ${S.done['sl_'+s.id]?'done':''}" onclick="toggleD('sl_${s.id}')">${S.done['sl_'+s.id]?'Done ✓':'Mark Done'}</button>
    </div>
  </div>`).join('')}</div>`;
}

function rQueue(){
  const tot=QUEUE.reduce((s,q)=>s+(q.revenue||0),0);
  return `<div class="col">
  <div class="s-dark" style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-size:15px;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">Signal AI Action Queue</div><div style="font-size:11px;color:var(--w3)">Ranked by revenue + urgency · OSI + Dynamics · ${QUEUE.length} items · Est. impact: <span style="color:var(--teal)">${fmt(tot)}</span></div></div>
  </div>
  ${QUEUE.map(q=>`<div class="s" style="border-left:3px solid ${q.pri==='P1'?'var(--red)':q.pri==='P2'?'var(--amber)':'var(--border)'};opacity:${S.done['q_'+q.id]?.5:1}">
    <div style="display:flex;gap:12px;margin-bottom:12px;cursor:pointer" onclick="drillQueue('${q.id}')">
      <div style="flex:1">
        <div style="display:flex;gap:7px;align-items:center;margin-bottom:7px;flex-wrap:wrap">${tag(q.pri,q.pri==='P1'?'red':q.pri==='P2'?'amber':'dim')}<span style="font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:.02em">${q.account}</span>${q.revenue?`<span class="num-xs" style="color:var(--teal);margin-left:auto">${fmt(q.revenue)}</span>`:''}</div>
        <div style="font-size:12px;color:var(--w2);line-height:1.6">${q.action}</div>
        <div style="font-size:10px;color:var(--w4);margin-top:5px">${q.market} · ${q.seller}</div>
      </div>
      <div style="text-align:right;flex-shrink:0"><div class="lbl" style="margin-bottom:4px">Due</div><div style="font-size:13px;font-weight:900;color:${q.due==='Today'?'var(--red)':q.due==='Tomorrow'?'var(--amber)':'var(--w3)'}">${q.due}</div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-ai" style="font-size:11px;padding:6px 12px" onclick="openAI('talking','Talking Points',true,'Account: ${q.account}. Market: ${q.market}. Action: ${q.action} Type: ${q.type}. Due: ${q.due}. Generate specific talking points for outreach today.')">Talking Points</button>
      ${q.type==='risk'?`<button class="btn-red" onclick="openAI('renewal','Rescue Plan',true,'Sun Valley Toyota, Salt Lake/KUTV. Renewal at risk: 58% decline, May 28 deadline, 11 days no contact. Build rescue plan with meeting agenda and fallbacks.')">Rescue Plan</button>`:''}
      <input class="note-in" placeholder="Note..." value="${S.notes['q_'+q.id]||''}" oninput="S.notes['q_${q.id}']=this.value" style="font-size:11px">
      <button class="done-btn ${S.done['q_'+q.id]?'done':''}" onclick="toggleD('q_${q.id}')">${S.done['q_'+q.id]?'Done ✓':'Mark Done'}</button>
    </div>
  </div>`).join('')}</div>`;
}

function switchP(p){S.persona=p;S.tab=NAV[p][0].l;render()}
function switchT(t){S.tab=t;render()}
function toggleD(k){S.done[k]=!S.done[k];render()}
render();
</script>
</body>
</html>
