<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AMP Signal — Sales Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0a0a0a; --b2:#111; --b3:#161616; --b4:#1e1e1e; --b5:#282828; --b6:#333;
  --lime:#c5f135; --lime2:#d4f755; --lime-dim:rgba(197,241,53,.12); --lime-mid:rgba(197,241,53,.25);
  --white:#f0f0f0; --w2:#aaa; --w3:#666; --w4:#444;
  --green:#22c55e; --gdim:rgba(34,197,94,.15);
  --red:#ef4444;   --rdim:rgba(239,68,68,.15);
  --amber:#f59e0b; --adim:rgba(245,158,11,.15);
  --blue:#60a5fa;
  --border:#242424; --border2:#303030;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);font-size:13px;overflow:hidden;height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b5)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes shimmer{0%,100%{opacity:.3}50%{opacity:.6}}

/* TOPBAR */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{height:52px;background:var(--b2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 18px;gap:0;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;margin-right:18px;text-decoration:none}
.logo-box{width:32px;height:32px;background:var(--lime);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;color:var(--black);letter-spacing:-.02em;flex-shrink:0}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:.05em;text-transform:uppercase;color:var(--white);line-height:1}
.logo-sub{font-family:'Barlow',sans-serif;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--w3);margin-top:1px}
.tb-sep{width:1px;height:22px;background:var(--border);margin:0 16px;flex-shrink:0}
.demo-tag{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--w3);border:1px solid var(--b5);padding:3px 8px;margin-right:10px}
.persona-wrap{display:flex;align-items:center;gap:8px}
.persona-tabs{display:flex;gap:2px;background:var(--b4);border:1px solid var(--border);padding:3px}
.ptab{background:none;border:none;padding:4px 12px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:600;color:var(--w3);cursor:pointer;letter-spacing:.04em;text-transform:uppercase;transition:all .12s}
.ptab.on{background:var(--lime);color:var(--black);font-weight:800}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-tag{display:flex;align-items:center;gap:5px;border:1px solid var(--green);padding:3px 10px;font-size:10px;font-weight:800;color:var(--green);letter-spacing:.1em;text-transform:uppercase}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.brief-btn{background:var(--lime);border:none;padding:7px 18px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--black);cursor:pointer;transition:background .12s}
.brief-btn:hover{background:var(--lime2)}
.user-box{width:30px;height:30px;background:var(--b4);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--w2);letter-spacing:.03em}

/* NOTIF */
#notif{background:var(--b2);border-bottom:2px solid var(--lime);padding:8px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
#notif.hidden{display:none}
.notif-pill{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--lime);color:var(--black);padding:3px 9px;flex-shrink:0}
.notif-txt{font-size:12px;color:var(--w2);flex:1}.notif-txt b{color:var(--lime);font-weight:700}
.notif-x{background:none;border:none;color:var(--w3);cursor:pointer;font-size:16px;line-height:1;padding:0}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:192px;background:var(--b2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;padding:14px 0}
.sb-hd{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--w3);padding:0 14px;margin-bottom:5px}
.nb{width:100%;background:none;border:none;padding:8px 14px;font-family:'Barlow',sans-serif;font-size:13px;font-weight:500;color:var(--w3);cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .1s;border-left:2px solid transparent;margin-bottom:1px}
.nb:hover{background:var(--b3);color:var(--white)}
.nb.on{background:var(--b3);color:var(--white);font-weight:700;border-left-color:var(--lime)}
.nb-ic{font-size:10px;opacity:.4;width:14px;text-align:center}.nb.on .nb-ic{opacity:1;color:var(--lime)}
.sb-div{height:1px;background:var(--border);margin:12px 14px}
.cf-sb{padding:0 14px}
.cfm{margin-bottom:9px}
.cfm-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.cfm-n{font-size:10px;color:var(--w3);line-height:1.3}.cfm-v{font-family:'Space Mono',monospace;font-size:9px;font-weight:700}
.mtrack{height:3px;background:var(--b5);border-radius:1px;overflow:hidden}.mfill{height:100%;border-radius:1px}
.sb-bot{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.src{display:flex;align-items:center;gap:7px;padding:3px 0}
.src-d{width:4px;height:4px;border-radius:50%;background:var(--green)}
.src-l{font-size:10px;color:var(--w3)}

/* CONTENT */
#content{flex:1;overflow-y:auto;background:var(--black)}
#ci{padding:20px 22px 32px}
.ph{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
.pt{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;letter-spacing:.02em;text-transform:uppercase;line-height:1}
.ps{font-size:11px;color:var(--w3);margin-top:4px;font-weight:500}

/* SURFACES */
.s{background:var(--b2);border:1px solid var(--border);padding:18px}
.s-sm{background:var(--b2);border:1px solid var(--border);padding:14px}
.s-hero{background:var(--b3);border:1px solid var(--border2);padding:22px 24px}

/* HERO LIME */
.hero-lime{background:var(--lime);padding:22px 24px;color:var(--black)}
.hero-lime .lbl{color:rgba(0,0,0,.55)}
.hero-lime .num-xl{color:var(--black)}

/* TYPOGRAPHY */
.lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--w3)}
.num-xl{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;letter-spacing:-.02em;line-height:1}
.num-lg{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:800;letter-spacing:-.01em;line-height:1}
.num-md{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;line-height:1}
.num-sm{font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.num-xs{font-family:'Space Mono',monospace;font-size:11px}

/* TAGS */
.tag{display:inline-flex;align-items:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px}
.tag-lime{background:var(--lime);color:var(--black)}
.tag-green{background:var(--gdim);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.tag-red{background:var(--rdim);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.tag-amber{background:var(--adim);color:var(--amber);border:1px solid rgba(245,158,11,.3)}
.tag-dim{background:var(--b4);color:var(--w2);border:1px solid var(--border2)}
.tag-blue{background:rgba(96,165,250,.12);color:var(--blue);border:1px solid rgba(96,165,250,.25)}

/* PROGRESS */
.track{background:var(--b5);overflow:hidden}.fill{height:100%;transition:width .7s ease}

/* BUTTONS */
.btn-ai{background:var(--lime);border:none;padding:7px 14px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--black);cursor:pointer;transition:background .12s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn-ai:hover{background:var(--lime2)}
.btn-ghost{background:var(--b4);border:1px solid var(--border2);padding:7px 12px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;color:var(--w2);cursor:pointer;transition:all .12s}
.btn-ghost:hover{background:var(--b5);color:var(--white)}
.btn-red{background:var(--rdim);border:1px solid rgba(239,68,68,.3);padding:7px 12px;font-family:'Barlow',sans-serif;font-size:12px;font-weight:700;color:var(--red);cursor:pointer}
.note-in{background:var(--b3);border:1px solid var(--border);padding:6px 10px;font-family:'Barlow',sans-serif;font-size:12px;color:var(--white);outline:none;flex:1;transition:border .12s}
.note-in::placeholder{color:var(--w4)}
.note-in:focus{border-color:var(--lime)}
.done-btn{background:var(--b4);border:1px solid var(--border2);padding:6px 12px;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;color:var(--w3);cursor:pointer;flex-shrink:0;transition:all .12s}
.done-btn.done{background:var(--gdim);border-color:rgba(34,197,94,.3);color:var(--green)}

/* GRIDS */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g32{display:grid;grid-template-columns:3fr 2fr;gap:14px}
.g21{display:grid;grid-template-columns:2fr 1fr;gap:14px}
.col{display:flex;flex-direction:column;gap:12px}
.row{display:flex;gap:12px}

/* DATA ROWS */
.dr{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px;cursor:pointer;transition:background .1s;margin:0 -8px;padding-left:8px;padding-right:8px}
.dr:last-child{border-bottom:none}
.dr:hover{background:var(--b3)}
.pri-bar{width:3px;border-radius:1px;flex-shrink:0;align-self:stretch;min-height:18px}

/* SECTION HEADER */
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.sh-t{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--w2)}

/* AI MODAL */
#ai-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
#ai-ov.hidden{display:none}
#ai-p{background:var(--b2);border:1px solid var(--border2);border-top:3px solid var(--lime);width:100%;max-width:740px;max-height:56vh;display:flex;flex-direction:column;animation:slideUp .2s ease;box-shadow:0 -16px 48px rgba(0,0,0,.6)}
.ai-hdr{display:flex;align-items:center;gap:8px;padding:12px 18px;border-bottom:1px solid var(--border)}
.ai-dot{width:6px;height:6px;background:var(--lime);animation:pulse 2s infinite}
.ai-ttl{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--lime)}
.ai-chip{font-size:10px;color:var(--w3);background:var(--b4);padding:2px 8px;font-weight:600}
.ai-x{margin-left:auto;background:var(--b4);border:1px solid var(--border);width:24px;height:24px;cursor:pointer;color:var(--w2);font-size:14px;display:flex;align-items:center;justify-content:center;font-family:'Barlow',sans-serif}
.ai-body{flex:1;overflow-y:auto;padding:16px 18px}
.ai-out{font-size:13px;color:var(--w2);line-height:1.95;white-space:pre-wrap}
.ai-load{display:flex;flex-direction:column;gap:8px}
.ai-msg{font-size:11px;color:var(--w3);font-style:italic;margin-bottom:4px}
.sk{height:8px;background:var(--b4);animation:shimmer 1.4s infinite}

/* DRILL */
#dr-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:flex-end;backdrop-filter:blur(2px)}
#dr-ov.hidden{display:none}
#dr-p{background:var(--b2);border-left:1px solid var(--border2);width:400px;height:100%;display:flex;flex-direction:column;animation:slideIn .2s ease;overflow-y:auto}
.dr-hdr{padding:18px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--b2);z-index:5;display:flex;align-items:flex-start;gap:12px}
.dr-back{background:var(--b4);border:1px solid var(--border2);padding:5px 12px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;color:var(--w2);flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.dr-ttl{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;line-height:1}
.dr-sub{font-size:11px;color:var(--w3);margin-top:3px}
.dr-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}

/* CHART */
.chart{display:flex;gap:5px;align-items:flex-end;height:90px}
.cc{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.cpair{display:flex;gap:2px;align-items:flex-end;width:100%}
.cb{flex:1;min-height:3px}
.clbl{font-size:9px;color:var(--w3);font-weight:600}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <div class="logo-box">A</div>
      <div>
        <div class="logo-text">AMP Signal</div>
        <div class="logo-sub">Sales Intelligence Platform</div>
      </div>
    </div>
    <div class="tb-sep"></div>
    <div class="demo-tag">DEMO VIEW</div>
    <div class="persona-wrap">
      <div class="persona-tabs" id="ptabs"></div>
    </div>
    <div class="tb-r">
      <div class="live-tag"><div class="live-dot"></div>LIVE</div>
      <button class="brief-btn" id="brief-btn">Signal Brief</button>
      <div class="user-box" id="ubox">RM</div>
    </div>
  </div>

  <div id="notif">
    <div class="notif-pill">Scatter Alert</div>
    <span class="notif-txt"><b>$218K Q2 prime returned in Baltimore</b> — OSI data, 72-hour window. 3 matching accounts in Dynamics. WBFF market.</span>
    <button class="notif-x" onclick="document.getElementById('notif').classList.add('hidden')">×</button>
  </div>

  <div id="body">
    <div id="sidebar">
      <div style="padding:0 14px;margin-bottom:8px"><div class="sb-hd">Views</div></div>
      <div id="nb-list"></div>
      <div class="sb-div"></div>
      <div class="sb-hd" style="padding:0 14px;margin-bottom:8px">Critical Few</div>
      <div class="cf-sb" id="cf-sb"></div>
      <div class="sb-bot">
        <div class="src"><div class="src-d"></div><span class="src-l">OSI Traffic</span></div>
        <div class="src"><div class="src-d"></div><span class="src-l">MS Dynamics CRM</span></div>
      </div>
    </div>
    <div id="content"><div id="ci"></div></div>
  </div>
</div>

<!-- AI MODAL -->
<div id="ai-ov" class="hidden" onclick="if(event.target===this)closeAI()">
  <div id="ai-p">
    <div class="ai-hdr">
      <div class="ai-dot"></div>
      <span class="ai-ttl">Signal AI</span>
      <span class="ai-chip" id="ai-chip"></span>
      <div class="ai-x" onclick="closeAI()">×</div>
    </div>
    <div class="ai-body" id="ai-b"></div>
  </div>
</div>

<!-- DRILL PANEL -->
<div id="dr-ov" class="hidden" onclick="if(event.target===this)closeDrill()">
  <div id="dr-p">
    <div class="dr-hdr">
      <button class="dr-back" onclick="closeDrill()">← Back</button>
      <div>
        <div class="dr-ttl" id="dr-ttl"></div>
        <div class="dr-sub" id="dr-sub"></div>
      </div>
    </div>
    <div class="dr-body" id="dr-body"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const fmt = n => n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${n}`;
const gc  = p => p>=100?'var(--green)':p>=88?'var(--amber)':'var(--red)';
const gct = p => p>=100?'green':p>=88?'amber':'red';

// Real Sinclair markets
const REGIONS = [
  {id:'r1',name:'Baltimore / DC',  vp:'Priya Nair',   pct:95, digital:31,health:78,revenue:28400000,goal:30000000,sellers:112,newBiz:8, markets:'WBFF, WJLA, WDCA',   topRisk:'Renewal cluster Q2'},
  {id:'r2',name:'Seattle / Portland',vp:'Marcus Webb', pct:103,digital:29,health:91,revenue:24600000,goal:23800000,sellers:98, newBiz:14,markets:'KOMO, KATU, KUNS',   topRisk:'Digital mix below CF target'},
  {id:'r3',name:'Columbus / Dayton',vp:'Tanya Okafor', pct:81, digital:19,health:57,revenue:18900000,goal:23400000,sellers:104,newBiz:3, markets:'WSYX, WTTE, WRGT',   topRisk:'Below pace — needs intervention'},
  {id:'r4',name:'Tampa / Orlando',  vp:'Derek Huang',  pct:103,digital:27,health:88,revenue:21300000,goal:20600000,sellers:88, newBiz:11,markets:'WTTA, WKCF, WRBW',   topRisk:'Political scatter window open'},
  {id:'r5',name:'Las Vegas / Reno', vp:'Joel Sandoval',pct:85, digital:22,health:66,revenue:11200000,goal:13200000,sellers:62, newBiz:5, markets:'KSNV, KRXI, KRNV',   topRisk:'Pacing gap widening'},
  {id:'r6',name:'Salt Lake / Boise',vp:'Angela Kim',   pct:103,digital:34,health:92,revenue:19800000,goal:19200000,sellers:94, newBiz:13,markets:'KUTV, KMYU, KBOI',   topRisk:'CTV inventory tightening'},
  {id:'r7',name:'Tulsa / Little Rock',vp:'Darnell Price',pct:81,digital:17,health:53,revenue:10400000,goal:12800000,sellers:71,newBiz:2, markets:'KTUL, KATV, KFSM',   topRisk:'Below pace — needs intervention'},
  {id:'r8',name:'Pittsburgh / Roanoke',vp:'Sonia Reyes',pct:97,digital:30,health:82,revenue:16600000,goal:17200000,sellers:83,newBiz:9, markets:'WJAC, WPGH, WSET',   topRisk:'Scatter capture window open'},
];

const CF = [
  {id:1,title:'Digital Mix',       current:24,target:35, unit:'%',    status:'behind'  },
  {id:2,title:'Political Scatter', current:68,target:100,unit:'%',    status:'on-track'},
  {id:3,title:'Lapsed Auto',       current:41,target:60, unit:'%',    status:'behind'  },
  {id:4,title:'New Business',      current:9, target:12, unit:' accts',status:'at-risk' },
  {id:5,title:'CTV Sell-Through',  current:79,target:85, unit:'%',    status:'on-track'},
];

const SELLERS = [
  {id:'s1',name:'Jordan Patel',  title:'Automotive',      pct:94, revenue:920000, goal:980000, risk:2,newBiz:3,digital:18,accounts:24,lastContact:'2d ago'},
  {id:'s2',name:'Aisha Morales', title:'Retail & QSR',    pct:109,revenue:1140000,goal:1050000,risk:0,newBiz:5,digital:31,accounts:31,lastContact:'Today'},
  {id:'s3',name:'Tyler Nguyen',  title:'Healthcare/Legal',pct:84, revenue:760000, goal:900000, risk:4,newBiz:1,digital:22,accounts:28,lastContact:'4d ago'},
  {id:'s4',name:'Carlos Esteban',title:'Political',       pct:106,revenue:1380000,goal:1300000,risk:0,newBiz:4,digital:11,accounts:18,lastContact:'Today'},
  {id:'s5',name:'Becca Liu',     title:'Financial',       pct:104,revenue:880000, goal:850000, risk:1,newBiz:2,digital:27,accounts:22,lastContact:'Yesterday'},
];

const QUEUE = [
  {id:'q1',pri:'P1',account:'Sun Valley Toyota',    action:'Renewal at risk — 58% spend decline. May 28 deadline. OSI + Dynamics flagged.',     revenue:141000,due:'Today',    type:'risk',    seller:'Jordan Patel',  market:'Salt Lake City'},
  {id:'q2',pri:'P1',account:'Midtown Honda Group',  action:'No digital products. $184K account. Critical Few upsell opportunity via Dynamics.',  revenue:184000,due:'Today',    type:'upsell',  seller:'Jordan Patel',  market:'Columbus'},

async function openAI(key,label,live=false,prompt=''){
  document.getElementById('ai-ov').classList.remove('hidden');
  document.getElementById('ai-chip').textContent=label;
  const b=document.getElementById('ai-b');
  b.innerHTML=`<div class="ai-load"><div class="ai-msg">Analyzing OSI + Dynamics data for ${label}...</div>${[88,72,80,60].map((w,i)=>`<div class="sk" style="width:${w}%;animation-delay:${i*.12}s"></div>`).join('')}</div>`;
  clearInterval(typerT);
  if(live){
    try{
      const r=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
          system:'You are Signal AI inside AMP Signal, Sinclair Broadcast Group\'s AI sales intelligence platform. You have OSI traffic data and Microsoft Dynamics CRM access. Be sharp, specific, and action-oriented. Use SITUATION / IMPACT / MOVE structure. Reference specific Sinclair markets (Baltimore WBFF, Seattle KOMO, Columbus WSYX, etc.) where relevant. Keep it tight.',
          messages:[{role:'user',content:prompt}]})});
      const d=await r.json();
      const txt=d.content?.[0]?.text||'Unable to generate analysis.';
      b.innerHTML=`<div class="ai-out" id="ai-out"></div>`;
      type(document.getElementById('ai-out'),txt);
    }catch(e){fallback(key,b);}
  } else {
    setTimeout(()=>fallback(key,b),600+Math.random()*300);
  }
}
function fallback(key,b){
  const txt=AI[key]||AI.talking;
  b.innerHTML=`<div class="ai-out" id="ai-out"></div>`;
  type(document.getElementById('ai-out'),txt);
}
function type(el,txt){
  let i=0; clearInterval(typerT);
  typerT=setInterval(()=>{if(i<txt.length){el.textContent=txt.slice(0,++i);}else clearInterval(typerT);},12);
}
function closeAI(){clearInterval(typerT);document.getElementById('ai-ov').classList.add('hidden');}

      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px">Signal AI Action Queue</div>
        <div style="font-size:11px;color:var(--w3)">Ranked by revenue + urgency · OSI + Dynamics · ${QUEUE.length} items · Est. impact: <span style="color:var(--lime)">${fmt(tot)}</span></div>
      </div>
    </div>
    ${QUEUE.map(q=>`
    <div class="s" style="border-left:3px solid ${q.pri==='P1'?'var(--red)':q.pri==='P2'?'var(--amber)':'var(--border)'};opacity:${S.done['q_'+q.id]?.5:1}">
      <div style="display:flex;gap:12px;margin-bottom:12px;cursor:pointer" onclick="drillQueue('${q.id}')">
        <div style="flex:1">
          <div style="display:flex;gap:7px;align-items:center;margin-bottom:7px;flex-wrap:wrap">
            ${tag(q.pri,q.pri==='P1'?'red':q.pri==='P2'?'amber':'dim')}
            <span style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.03em">${q.account}</span>
            ${q.revenue?`<span class="num-xs" style="color:var(--lime);margin-left:auto">${fmt(q.revenue)}</span>`:''}
          </div>
          <div style="font-size:12px;color:var(--w2);line-height:1.6">${q.action}</div>
          <div style="font-size:10px;color:var(--w3);margin-top:5px">${q.market} · ${q.seller}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="lbl" style="margin-bottom:4px">Due</div>
          <div style="font-size:13px;font-weight:700;color:${q.due==='Today'?'var(--red)':q.due==='Tomorrow'?'var(--amber)':'var(--w3)'}">${q.due}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-ai" style="font-size:12px;padding:6px 12px" onclick="openAI('talking','Talking Points',true,'Account: ${q.account}. Market: ${q.market}. Situation: ${q.action} Type: ${q.type}. Due: ${q.due}. Generate specific talking points for outreach today.')">Talking Points</button>
        ${q.type==='risk'?`<button class="btn-red" onclick="openAI('renewal','Rescue Plan',true,'Account: Sun Valley Toyota, Salt Lake City KUTV market. Renewal at risk: 58% spend decline, renewal May 28, 11 days no contact in Dynamics. Build a rescue plan.')">Rescue Plan</button>`:''}
        <input class="note-in" placeholder="Note..." value="${S.notes['q_'+q.id]||''}" oninput="S.notes['q_${q.id}']=this.value" style="font-size:11px">
        <button class="done-btn ${S.done['q_'+q.id]?'done':''}" onclick="toggleD('q_${q.id}')">${S.done['q_'+q.id]?'Done ✓':'Mark Done'}</button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function switchP(p){S.persona=p;S.tab=NAV[p][0].l;render()}
function switchT(t){S.tab=t;render()}
function toggleD(k){S.done[k]=!S.done[k];render()}
render();
</script>
</body>
</html>
