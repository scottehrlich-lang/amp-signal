<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AMP Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #080f1a;
  --navy-2: #0d1829;
  --navy-3: #162035;
  --navy-4: #1e2d47;
  --navy-5: #273d5e;
  --amber: #f5a623;
  --amber-dim: #f5a62330;
  --green: #00d085;
  --green-dim: #00d08520;
  --red: #ff4444;
  --red-dim: #ff444420;
  --yellow: #ffd166;
  --blue: #4e9bff;
  --text: #e8edf5;
  --text-2: #8fa3be;
  --text-3: #4a6480;
  --border: #1e2d47;
  --border-2: #273d5e;
  --indigo: #6366f1;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--text);
  font-size: 13px;
  overflow: hidden;
  height: 100vh;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--navy-5); border-radius: 2px; }

/* ANIMATIONS */
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes shimmer { 0%{opacity:.4} 50%{opacity:.8} 100%{opacity:.4} }
@keyframes barGrow { from { width: 0; } to { width: var(--w); } }
@keyframes countUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; }

/* TOP BAR */
#topbar {
  height: 52px;
  background: var(--navy-2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 0;
  flex-shrink: 0;
  position: relative;
}

.logo-mark {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 24px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: var(--amber);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 12px;
  color: var(--navy);
}
.logo-text {
  font-family: 'Syne', sans-serif;
  font-weight: 800; font-size: 14px;
  letter-spacing: -.02em;
  color: var(--text);
}
.logo-text span { color: var(--amber); }

.topbar-sep { width: 1px; height: 20px; background: var(--border); margin: 0 16px; }

.persona-tabs {
  display: flex;
  gap: 2px;
  background: var(--navy-3);
  border-radius: 8px;
  padding: 3px;
}
.persona-tab {
  background: none; border: none;
  padding: 4px 12px;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500;
  color: var(--text-3);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.persona-tab.active {
  background: var(--navy-5);
  color: var(--text);
  font-weight: 600;
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.live-badge {
  display: flex; align-items: center; gap: 5px;
  background: var(--green-dim);
  border: 1px solid var(--green);
  border-radius: 999px;
  padding: 3px 10px;
  font-size: 10px; font-weight: 700;
  color: var(--green);
  letter-spacing: .08em;
}
.live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }

.signal-brief-btn {
  background: var(--amber);
  border: none; border-radius: 7px;
  padding: 6px 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 700;
  color: var(--navy);
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.signal-brief-btn:hover { background: #fdb646; transform: translateY(-1px); }

.user-chip {
  width: 28px; height: 28px;
  background: var(--navy-4);
  border: 1px solid var(--border-2);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  color: var(--text-2);
}

/* NOTIF */
#notif {
  background: linear-gradient(90deg, #1a1400, #1a1200);
  border-bottom: 1px solid #f5a62340;
  padding: 9px 18px;
  display: flex; align-items: center; gap: 10px;
  flex-shrink: 0;
}
#notif.hidden { display: none; }
.notif-pip { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); animation: pulse 1.5s infinite; flex-shrink: 0; }
.notif-text { font-size: 12px; color: #e8b84b; flex: 1; }
.notif-text b { color: var(--amber); font-weight: 700; }
.notif-close { background: none; border: none; color: var(--text-3); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; }

/* BODY LAYOUT */
#body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
#sidebar {
  width: 200px;
  background: var(--navy-2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  padding: 14px 0;
}

.sidebar-section { padding: 0 12px; margin-bottom: 6px; }
.sidebar-label {
  font-size: 9px; font-weight: 700;
  color: var(--text-3);
  letter-spacing: .12em;
  padding: 0 8px;
  margin-bottom: 4px;
}
.nav-btn {
  width: 100%;
  background: none; border: none;
  padding: 7px 8px;
  border-radius: 7px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 400;
  color: var(--text-2);
  cursor: pointer;
  text-align: left;
  display: flex; align-items: center; gap: 8px;
  transition: all .12s;
  margin-bottom: 1px;
}
.nav-btn:hover { background: var(--navy-3); color: var(--text); }
.nav-btn.active { background: var(--navy-4); color: var(--text); font-weight: 600; }
.nav-btn .nav-icon { width: 14px; font-size: 11px; opacity: .6; text-align: center; }
.nav-btn.active .nav-icon { opacity: 1; }

.sidebar-divider { height: 1px; background: var(--border); margin: 10px 12px; }

.cf-mini { padding: 0 12px; }
.cf-mini-item { margin-bottom: 8px; }
.cf-mini-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
.cf-mini-title { font-size: 10px; color: var(--text-3); line-height: 1.3; }
.cf-mini-val { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; }
.mini-bar { height: 3px; background: var(--navy-4); border-radius: 999px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 999px; transition: width .8s ease; }

.sidebar-sources { margin-top: auto; padding: 12px; border-top: 1px solid var(--border); }
.source-item { display: flex; align-items: center; gap: 6px; padding: 3px 0; }
.source-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green); }
.source-name { font-size: 10px; color: var(--text-3); }

/* CONTENT */
#content { flex: 1; overflow-y: auto; background: var(--navy); }
#content-inner { padding: 20px 24px 32px; }

.page-hdr {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px;
}
.page-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -.03em; }
.page-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

/* CARDS / SURFACES */
.surface {
  background: var(--navy-2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
}
.surface-sm { padding: 14px; }
.surface-lg { padding: 24px; }

/* HERO SURFACES */
.hero-amber {
  background: linear-gradient(135deg, #1a0f00, #201500);
  border: 1px solid #f5a62330;
  border-radius: 14px;
  padding: 22px 24px;
  position: relative;
  overflow: hidden;
}
.hero-amber::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, #f5a62315, transparent 70%);
  pointer-events: none;
}
.hero-dark {
  background: linear-gradient(135deg, var(--navy-2), var(--navy-3));
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px;
}
.hero-green {
  background: linear-gradient(135deg, #001a0f, #001508);
  border: 1px solid #00d08525;
  border-radius: 14px;
  padding: 22px 24px;
}

/* TYPOGRAPHY */
.num-xl { font-family: 'Space Mono', monospace; font-size: 42px; font-weight: 700; letter-spacing: -.03em; line-height: 1; }
.num-lg { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; letter-spacing: -.02em; line-height: 1; }
.num-md { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; }
.num-sm { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
.num-xs { font-family: 'Space Mono', monospace; font-size: 11px; }
.label { font-size: 9px; font-weight: 700; letter-spacing: .1em; color: var(--text-3); text-transform: uppercase; }
.sublabel { font-size: 11px; color: var(--text-2); margin-top: 2px; }

/* BADGES */
.badge {
  display: inline-flex; align-items: center;
  font-size: 9px; font-weight: 700;
  letter-spacing: .06em;
  padding: 3px 7px;
  border-radius: 4px;
}
.badge-green { background: var(--green-dim); color: var(--green); border: 1px solid #00d08530; }
.badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid #f5a62330; }
.badge-red { background: var(--red-dim); color: var(--red); border: 1px solid #ff444430; }
.badge-blue { background: #4e9bff15; color: var(--blue); border: 1px solid #4e9bff30; }
.badge-dim { background: var(--navy-4); color: var(--text-3); border: 1px solid var(--border); }

/* PROGRESS BARS */
.bar-track { background: var(--navy-4); border-radius: 999px; overflow: hidden; }
.bar-fill { border-radius: 999px; height: 100%; animation: barGrow .8s ease forwards; }

/* BUTTONS */
.btn-ai {
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border: none; border-radius: 7px;
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.btn-ai:hover { transform: translateY(-1px); box-shadow: 0 4px 16px #6366f130; }

.btn-ghost {
  background: var(--navy-3);
  border: 1px solid var(--border-2);
  border-radius: 7px;
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500;
  color: var(--text-2);
  cursor: pointer;
  transition: all .15s;
}
.btn-ghost:hover { background: var(--navy-4); color: var(--text); }

.btn-danger {
  background: var(--red-dim);
  border: 1px solid #ff444430;
  border-radius: 7px;
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 600;
  color: var(--red);
  cursor: pointer;
}

/* DATA TABLE ROWS */
.data-row {
  display: flex; align-items: center;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  cursor: pointer;
  transition: background .12s;
  border-radius: 6px;
  margin: 0 -6px;
  padding-left: 6px; padding-right: 6px;
}
.data-row:last-child { border-bottom: none; }
.data-row:hover { background: var(--navy-3); }

/* PRIORITY LINE */
.priority-line { width: 3px; border-radius: 999px; flex-shrink: 0; align-self: stretch; min-height: 20px; }

/* NOTE INPUT */
.note-input {
  background: var(--navy-3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  color: var(--text);
  outline: none;
  flex: 1;
  transition: border .15s;
}
.note-input::placeholder { color: var(--text-3); }
.note-input:focus { border-color: var(--indigo); }

.done-btn {
  background: var(--navy-3);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 6px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 600;
  color: var(--text-3);
  cursor: pointer;
  flex-shrink: 0;
  transition: all .15s;
}
.done-btn.done { background: var(--green-dim); border-color: #00d08530; color: var(--green); }

/* GRIDS */
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
.g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.g32 { display: grid; grid-template-columns: 3fr 2fr; gap: 14px; }
.g21 { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; }
.col { display: flex; flex-direction: column; gap: 12px; }
.row { display: flex; gap: 12px; }

/* STAT BLOCK */
.stat-block { flex: 1; }
.stat-block .label { margin-bottom: 5px; }

/* SECTION HEADER */
.sec-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.sec-title { font-size: 11px; font-weight: 700; color: var(--text-2); letter-spacing: .06em; text-transform: uppercase; }

/* SPARKLINE */
.sparkline { display: flex; gap: 3px; align-items: flex-end; }
.spark-bar { width: 14px; border-radius: 2px 2px 0 0; }

/* AI MODAL */
#ai-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 500;
  display: flex; align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}
#ai-overlay.hidden { display: none; }
#ai-panel {
  background: var(--navy-2);
  border: 1px solid var(--border-2);
  border-radius: 16px 16px 0 0;
  border-top: 2px solid var(--indigo);
  width: 100%; max-width: 760px;
  max-height: 58vh;
  display: flex; flex-direction: column;
  animation: slideUp .2s ease;
  box-shadow: 0 -20px 60px rgba(0,0,0,.5);
}
.ai-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
}
.ai-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--indigo); animation: pulse 2s infinite; }
.ai-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: var(--indigo); letter-spacing: .08em; }
.ai-chip { font-size: 10px; color: var(--text-3); background: var(--navy-3); padding: 2px 8px; border-radius: 4px; }
.ai-close { margin-left: auto; background: var(--navy-3); border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; color: var(--text-2); font-size: 14px; display: flex; align-items: center; justify-content: center; }
.ai-body { flex: 1; overflow-y: auto; padding: 16px 18px; }
.ai-output { font-size: 13px; color: var(--text-2); line-height: 2; white-space: pre-wrap; }
.ai-loading { display: flex; flex-direction: column; gap: 8px; }
.ai-loading-msg { font-size: 11px; color: var(--text-3); font-style: italic; margin-bottom: 4px; }
.skel { height: 8px; background: var(--navy-4); border-radius: 3px; animation: shimmer 1.4s infinite; }

/* DRILL PANEL */
#drill-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 400;
  display: flex; align-items: center; justify-content: flex-end;
  backdrop-filter: blur(2px);
}
#drill-overlay.hidden { display: none; }
#drill-panel {
  background: var(--navy-2);
  border-left: 1px solid var(--border-2);
  width: 420px; height: 100%;
  display: flex; flex-direction: column;
  animation: slideRight .2s ease;
  overflow-y: auto;
}
@keyframes slideRight { from { transform: translateX(40px); opacity:0; } to { transform: translateX(0); opacity:1; } }
.drill-hdr {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 12px;
  position: sticky; top: 0;
  background: var(--navy-2);
  z-index: 10;
}
.drill-back { background: var(--navy-3); border: 1px solid var(--border); border-radius: 7px; padding: 5px 10px; cursor: pointer; font-size: 11px; color: var(--text-2); font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
.drill-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }

/* CHART */
.chart-wrap { display: flex; gap: 4px; align-items: flex-end; height: 100px; }
.chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.chart-bars-pair { display: flex; gap: 2px; align-items: flex-end; width: 100%; }
.chart-bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 3px; }
.chart-lbl { font-size: 9px; color: var(--text-3); font-weight: 600; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo-mark">
      <div class="logo-icon">A</div>
      <span class="logo-text"><span>AMP</span> Signal</span>
    </div>
    <div class="topbar-sep"></div>
    <div class="persona-tabs" id="persona-tabs"></div>
    <div class="topbar-right">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <button class="signal-brief-btn" id="brief-btn">✦ Signal Brief</button>
      <div class="user-chip" id="user-chip">RM</div>
    </div>
  </div>

  <div id="notif">
    <div class="notif-pip"></div>
    <span class="notif-text"><b>Scatter Alert:</b> $218K Q2 prime inventory returned in Philadelphia — OSI data, 72-hour capture window. 3 matching accounts in Dynamics.</span>
    <button class="notif-close" onclick="document.getElementById('notif').classList.add('hidden')">×</button>
  </div>

  <div id="body">
    <div id="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Views</div>
        <div id="nav-btns"></div>
      </div>
      <div class="sidebar-divider"></div>
      <div class="cf-mini">
        <div class="sidebar-label" style="padding:0 8px;margin-bottom:8px">Critical Few</div>
        <div id="cf-mini-list"></div>
      </div>
      <div class="sidebar-sources">
        <div class="source-item"><div class="source-dot"></div><span class="source-name">OSI Traffic</span></div>
        <div class="source-item"><div class="source-dot"></div><span class="source-name">MS Dynamics CRM</span></div>
      </div>
    </div>

    <div id="content">
      <div id="content-inner"></div>
    </div>
  </div>
</div>

<!-- AI MODAL -->
<div id="ai-overlay" class="hidden" onclick="if(event.target===this)closeAI()">
  <div id="ai-panel">
    <div class="ai-hdr">
      <div class="ai-dot"></div>
      <span class="ai-title">SIGNAL AI</span>
      <span class="ai-chip" id="ai-chip"></span>
      <button class="ai-close" onclick="closeAI()">×</button>
    </div>
    <div class="ai-body" id="ai-body"></div>
  </div>
</div>

<!-- DRILL PANEL -->
<div id="drill-overlay" class="hidden" onclick="if(event.target===this)closeDrill()">
  <div id="drill-panel">
    <div class="drill-hdr">
      <button class="drill-back" onclick="closeDrill()">← Back</button>
      <div>
        <div id="drill-title" style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800"></div>
        <div id="drill-sub" style="font-size:11px;color:var(--text-3);margin-top:2px"></div>
      </div>
    </div>
    <div class="drill-body" id="drill-body"></div>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const fmt = n => n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:`$${n}`;
const pct = (a,b) => Math.round(a/b*100);
const clr = p => p>=100?'var(--green)':p>=88?'var(--amber)':'var(--red)';
const clrBg = p => p>=100?'var(--green-dim)':p>=88?'var(--amber-dim)':'var(--red-dim)';
const trendArrow = t => t==='up'?'↑':t==='down'?'↓':'→';
const trendClr = t => t==='up'?'var(--green)':t==='down'?'var(--red)':'var(--text-3)';

const REGIONS = [
  {id:"r1",name:"Northeast",    vp:"Priya Nair",   pct:95, digital:31,health:78,revenue:28400000,goal:30000000,sellers:112,newBiz:8, topRisk:"Renewal cluster Q2"},
  {id:"r2",name:"Southeast",    vp:"Marcus Webb",  pct:103,digital:29,health:91,revenue:24600000,goal:23800000,sellers:98, newBiz:14,topRisk:"Digital mix below CF"},

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function bar(p, color, h=6) {
  const c = color || clr(p);
  return `<div class="bar-track" style="height:${h}px"><div class="bar-fill" style="width:${Math.min(p,100)}%;background:${c};--w:${Math.min(p,100)}%"></div></div>`;
}
function badge(label, type='dim') {
  return `<span class="badge badge-${type}">${label}</span>`;
}
function cfColor(s) { return {on_track:'var(--green)',"on-track":'var(--green)',behind:'var(--amber)',"at-risk":'var(--red)'}[s]||'var(--text-3)'; }
function cfBadge(s) {
  const map = {"on-track":["ON TRACK","green"],behind:["BEHIND","amber"],"at-risk":["AT RISK","red"]};
  const [l,t] = map[s]||["","dim"];
  return badge(l,t);
}

// ─── AI ───────────────────────────────────────────────────────────────────────
async function openAI(key, label, useAPI=false, prompt='') {
  document.getElementById('ai-overlay').classList.remove('hidden');
  document.getElementById('ai-chip').textContent = label;
  const body = document.getElementById('ai-body');
  body.innerHTML = `<div class="ai-loading"><div class="ai-loading-msg">Analyzing OSI and Dynamics data...</div>${[90,72,84,60].map((w,i)=>`<div class="skel" style="width:${w}%;animation-delay:${i*0.12}s"></div>`).join('')}</div>`;

  clearInterval(typingTimer);

  if (useAPI) {
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You are Signal AI, an embedded intelligence layer inside AMP Signal — Sinclair Broadcast Group's AI sales platform. You have access to OSI traffic data and Microsoft Dynamics CRM data. Your responses are sharp, data-driven, and action-oriented. Use SITUATION / IMPACT / MOVE structure. Be specific. Be brief. Use line breaks between sections.",
          messages: [{ role: "user", content: prompt }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || "Unable to generate analysis.";
      body.innerHTML = `<div class="ai-output" id="ai-out"></div>`;
      typeText(document.getElementById('ai-out'), text);
    } catch(e) {
      const text = AI_COPY[key] || AI_COPY.talking;
      body.innerHTML = `<div class="ai-output" id="ai-out"></div>`;
      typeText(document.getElementById('ai-out'), text);
    }
  } else {
    setTimeout(() => {
      const text = AI_COPY[key] || AI_COPY.talking;
      body.innerHTML = `<div class="ai-output" id="ai-out"></div>`;
      typeText(document.getElementById('ai-out'), text);
    }, 600 + Math.random()*300);
  }
}

function typeText(el, text) {
  let i = 0;
  clearInterval(typingTimer);
  typingTimer = setInterval(() => {
    if (i < text.length) { el.textContent = text.slice(0, ++i); }
    else clearInterval(typingTimer);
  }, 12);
}

function closeAI() {
  clearInterval(typingTimer);
  document.getElementById('ai-overlay').classList.add('hidden');
}

          </div>
        </div>
        <div style="display:flex;gap:5px">
          ${s.risk>0?badge(`${s.risk} risk`,'red'):''}
          ${badge(`${s.digital}% dig`,s.digital>=28?'green':'amber')}
        </div>
        <button class="btn-ai" style="font-size:10px;padding:5px 10px" onclick="openAI('talking','Coach — ${s.name}',true,'Seller: ${s.name}. Category: ${s.title}. Pacing: ${s.pct}% (${fmt(s.revenue)} vs ${fmt(s.goal)}). Digital mix: ${s.digital}%. New biz: ${s.newBiz} vs 4 target. At-risk accounts: ${s.risk}. Give me a coaching brief and 3 specific action items for today.')">Coach</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span style="font-size:10px;font-weight:700;color:var(--text-3);flex-shrink:0">NOTE</span>
        <input class="note-input" placeholder="Add note for ${s.name.split(' ')[0]}..." value="${S.notes['seller_'+s.id]||''}" oninput="S.notes['seller_${s.id}']=this.value">
        <button class="done-btn ${S.done['seller_'+s.id]?'done':''}" onclick="toggleDone('seller_${s.id}')">${S.done['seller_'+s.id]?'Done ✓':'Mark Done'}</button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── QUEUE ────────────────────────────────────────────────────────────────────
function renderQueue() {
  const total = QUEUE.reduce((s,q)=>s+(q.revenue||0),0);
  return `<div class="col">
    <div style="background:linear-gradient(135deg,var(--navy-3),var(--navy-2));border:1px solid var(--indigo)30;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px">
      <div style="flex:1">
        <div style="font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:2px">Signal AI Action Queue</div>
        <div style="font-size:11px;color:var(--text-3)">Ranked by revenue + urgency · OSI + Dynamics · ${QUEUE.length} items · Est. impact: <span style="color:var(--green)">${fmt(total)}</span></div>
      </div>
    </div>
    ${QUEUE.map(q=>`
    <div style="background:var(--navy-2);border:1px solid ${q.pri==='P1'?'#ff444425':q.pri==='P2'?'#f5a62325':'var(--border)'};border-left:3px solid ${q.pri==='P1'?'var(--red)':q.pri==='P2'?'var(--amber)':'var(--border)'};border-radius:12px;padding:16px;opacity:${S.done['queue_'+q.id]?0.5:1}">
      <div style="display:flex;gap:12px;margin-bottom:12px;cursor:pointer" onclick="drillQueue('${q.id}')">
        <div style="flex:1">
          <div style="display:flex;gap:7px;align-items:center;margin-bottom:6px">
            ${badge(q.pri,q.pri==='P1'?'red':q.pri==='P2'?'amber':'dim')}
            <span style="font-size:13px;font-weight:700">${q.account}</span>
            ${q.revenue?`<span class="num-xs" style="color:var(--green);margin-left:auto">${fmt(q.revenue)}</span>`:''}
          </div>
          <div style="font-size:12px;color:var(--text-2);line-height:1.6">${q.action}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="label" style="margin-bottom:4px">DUE</div>
          <div style="font-size:12px;font-weight:700;color:${q.due==='Today'?'var(--red)':q.due==='Tomorrow'?'var(--amber)':'var(--text-3)'}">${q.due}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-ai" style="font-size:10px;padding:5px 10px" onclick="openAI('talking','Talking Points',true,'Account: ${q.account}. Action needed: ${q.action}. Priority: ${q.pri}. Due: ${q.due}. Generate specific talking points for outreach today.')">Talking Points</button>
        ${q.type==='risk'?`<button class="btn-danger" style="font-size:10px;padding:5px 10px" onclick="openAI('renewal','Rescue Plan',true,'Sun Valley Toyota renewal rescue: 58% spend decline, renewal May 28, 11 days no contact in Dynamics. Build a specific rescue plan with meeting agenda and fallback positions.')">Rescue Plan</button>`:''}
        <input class="note-input" placeholder="Add note..." value="${S.notes['queue_'+q.id]||''}" oninput="S.notes['queue_${q.id}']=this.value" style="font-size:11px">
        <button class="done-btn ${S.done['queue_'+q.id]?'done':''}" onclick="toggleDone('queue_${q.id}')">${S.done['queue_'+q.id]?'Done ✓':'Mark Done'}</button>
      </div>
    </div>`).join('')}
  </div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
function switchPersona(p) { S.persona=p; S.tab=NAV[p][0].label; render(); }
function switchTab(t) { S.tab=t; render(); }
function toggleDone(k) { S.done[k]=!S.done[k]; render(); }

render();
</script>
</body>
</html>
