<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tab Count · Inside the Signal</title>
<meta name="description" content="14 tabs to 2. The same workday, sharper.">
<meta property="og:title" content="14 → 2">
<meta property="og:description" content="Inside the Signal · Drop 01 · Tab Count">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1634;
  --white: #fff;
  --off: #f7f8fc;
  --off2: #eef0f7;
  --text2: #3d4f6e;
  --text3: #7a8fa8;
  --border: #e4e8f2;
  --green: #00a86b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Lato', sans-serif;
  background: var(--white);
  color: var(--navy);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topnav {
  padding: 18px 5vw;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
}
.topnav .brand { color: var(--navy); display: flex; align-items: center; gap: 12px; }
.topnav .brand .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.topnav a { color: var(--text2); text-decoration: none; }
.topnav a:hover { color: var(--navy); }

.stage {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  padding: 5vw;
  gap: 6vw;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.copy h1 {
  font-weight: 900;
  font-size: clamp(48px, 7vw, 96px);
  line-height: .95;
  letter-spacing: -.03em;
  margin-bottom: 24px;
}
.copy .lede {
  font-size: clamp(18px, 1.6vw, 22px);
  color: var(--text2);
  max-width: 32ch;
  line-height: 1.5;
  margin-bottom: 32px;
}
.copy .meta {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text3);
  border-top: 1px solid var(--border);
  padding-top: 16px;
}

.stage .visual {
  position: relative;
  aspect-ratio: 4/5;
  background: var(--off);
  border-radius: 8px;
  border: 1px solid var(--border);
  overflow: hidden;
}

/* Maya as static, anchored bottom */
.maya-bg {
  position: absolute;
  inset: 0;
  background-image: url('../../../marketing-assets/character/maya-base.jpg');
  background-size: cover;
  background-position: center 20%;
}

/* Tab counter overlay */
.counter-card {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255,255,255,.96);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 32px 40px;
  border-radius: 8px;
  border: 1px solid var(--border);
  box-shadow: 0 12px 40px rgba(10,22,52,.18);
  text-align: center;
  font-feature-settings: "tnum" 1;
}
.counter-card .label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
}
.counter-card .num {
  font-weight: 900;
  font-size: clamp(60px, 9vw, 120px);
  line-height: 1;
  color: var(--navy);
  letter-spacing: -.04em;
}
.counter-card .hint {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: .14em;
  color: var(--text3);
  text-transform: uppercase;
  margin-top: 16px;
}

/* Phase: 14 tabs → 2 tabs animation */
@keyframes countdown {
  0%, 10%   { content: "14"; }
  20%       { content: "11"; }
  30%       { content: "9";  }
  40%       { content: "7";  }
  50%       { content: "5";  }
  60%       { content: "4";  }
  70%       { content: "3";  }
  80%, 100% { content: "2";  }
}
.counter-card .num::after {
  content: "14";
  animation: countdown 6s steps(1) infinite;
}

/* Pulse on landing at 2 */
@keyframes hint-pulse {
  0%, 75%, 100% { opacity: 0; }
  85%, 95% { opacity: 1; }
}
.counter-card .hint {
  opacity: 0;
  animation: hint-pulse 6s ease-in-out infinite;
}

footer {
  padding: 24px 5vw;
  border-top: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text3);
  display: flex;
  justify-content: space-between;
}
footer a { color: var(--navy); text-decoration: none; }

@media (max-width: 800px) {
  .stage { grid-template-columns: 1fr; gap: 32px; }
  .stage .visual { aspect-ratio: 1; }
}
</style>
</head>
<body>

<nav class="topnav">
  <div class="brand"><span class="dot"></span><span>Inside the Signal</span></div>
  <div><a href="../../">← Hub</a></div>
</nav>

<div class="stage">
  <div class="copy">
    <h1>14 tabs.<br>Then 2.</h1>
    <p class="lede">Same workday. Sharper. The intelligence comes to her — she stops chasing it across browser tabs and stitched-together spreadsheets.</p>
    <div class="meta">Drop 01 · Tab Count · Maya</div>
  </div>
  <div class="visual">
    <div class="maya-bg"></div>
    <div class="counter-card">
      <div class="label">Open browser tabs</div>
      <div class="num"></div>
      <div class="hint">↓ Same data. Less hunting.</div>
    </div>
  </div>
</div>

<footer>
  <span>Inside the Signal · Drop 01</span>
  <span><a href="../../">← Back to hub</a></span>
</footer>

</body>
</html>
